<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>海底世界 - 探索成长的奥秘</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        :root {
            --ocean-deep: #006064;
            --ocean-mid: #00ACC1;
            --ocean-light: #4DD0E1;
            --ocean-teal: #26A69A;
            --coral-pink: #FF8A80;
            --coral-orange: #FF9E80;
            --seaweed-green: #69F0AE;
            --text-cyan: #00BCD4;
            --text-teal: #004D40;
        }
        
        body {
            font-family: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
            background: linear-gradient(180deg, #00838F 0%, #006064 40%, #004D40 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .ocean-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .bubble {
            position: absolute;
            border-radius: 50%;
            background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.8), rgba(255,255,255,0.2);
            animation: bubbleRise 7s ease-in infinite;
        }
        
        .bubble:nth-child(1) { 
            width: 25px; height: 25px; 
            left: 15%; bottom: -10%; 
            animation-delay: 0s; 
        }
        .bubble:nth-child(2) { 
            width: 18px; height: 18px; 
            left: 30%; bottom: -15%; 
            animation-delay: -2s; 
        }
        .bubble:nth-child(3) { 
            width: 30px; height: 30px; 
            left: 50%; bottom: -10%; 
            animation-delay: -4s; 
        }
        .bubble:nth-child(4) { 
            width: 22px; height: 22px; 
            left: 70%; bottom: -18%; 
            animation-delay: -1s; 
        }
        .bubble:nth-child(5) { 
            width: 15px; height: 15px; 
            left: 85%; bottom: -12%; 
            animation-delay: -3s; 
        }
        .bubble:nth-child(6) { 
            width: 28px; height: 28px; 
            left: 8%; bottom: -20%; 
            animation-delay: -5s; 
        }
        
        @keyframes bubbleRise {
            0% {
                transform: translateY(0) scale(0.8);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(-110vh) translateX(20px) scale(1.1);
                opacity: 0;
            }
        }
        
        .seaweed {
            position: absolute;
            font-size: 60px;
            bottom: 0;
            animation: seaweedSway 4s ease-in-out infinite;
            transform-origin: bottom center;
        }
        
        .seaweed:nth-child(7) { left: 5%; animation-delay: 0s; }
        .seaweed:nth-child(8) { left: 20%; animation-delay: -1s; font-size: 50px; }
        .seaweed:nth-child(9) { right: 10%; animation-delay: -2s; }
        .seaweed:nth-child(10) { right: 25%; animation-delay: -0.5s; font-size: 55px; }
        
        @keyframes seaweedSway {
            0%, 100% {
                transform: rotate(-8deg);
            }
            50% {
                transform: rotate(8deg);
            }
        }
        
        .main-content {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 24px;
        }
        
        .octopus-container {
            position: relative;
            width: 240px;
            height: 240px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .water-ring {
            position: absolute;
            border-radius: 50%;
            border: 4px solid transparent;
            animation: waterPulse 3s ease-in-out infinite;
        }
        
        .water-ring:nth-child(1) {
            width: 140px;
            height: 140px;
            border-top-color: var(--ocean-light);
            border-right-color: var(--seaweed-green);
            animation-delay: 0s;
        }
        
        .water-ring:nth-child(2) {
            width: 180px;
            height: 180px;
            border-bottom-color: var(--coral-pink);
            border-left-color: var(--ocean-teal);
            animation-delay: -1s;
            animation-direction: reverse;
        }
        
        @keyframes waterPulse {
            0%, 100% {
                transform: rotate(0deg) scale(0.9);
                opacity: 0.5;
            }
            50% {
                transform: rotate(180deg) scale(1.1);
                opacity: 1;
            }
        }
        
        .octopus {
            font-size: 170px;
            animation: octopusSwim 3s cubic-bezier(0.4, 0.0, 0.2, 1) forwards, 
                       octopusFloat 5s ease-in-out infinite 3s;
            filter: drop-shadow(0 15px 40px rgba(0, 96, 100, 0.5));
        }
        
        @keyframes octopusSwim {
            0% {
                transform: translateX(-100px) translateY(80px) rotate(-25deg);
                opacity: 0;
            }
            50% {
                transform: translateX(20px) translateY(-20px) rotate(10deg);
                opacity: 1;
            }
            100% {
                transform: translateX(0) translateY(0) rotate(0deg);
                opacity: 1;
            }
        }
        
        @keyframes octopusFloat {
            0%, 100% {
                transform: translateY(0) rotate(-3deg);
            }
            25% {
                transform: translateY(-10px) rotate(3deg);
            }
            50% {
                transform: translateY(5px) rotate(-3deg);
            }
            75% {
                transform: translateY(-8px) rotate(3deg);
            }
        }
        
        .title-section {
            animation: titleWaveIn 1.8s ease-out 1.4s forwards;
            opacity: 0;
            transform: translateY(40px);
        }
        
        @keyframes titleWaveIn {
            0% {
                opacity: 0;
                transform: translateY(40px);
            }
            60% {
                opacity: 1;
                transform: translateY(-8px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .main-title {
            font-size: 3.2em;
            color: var(--seaweed-green);
            letter-spacing: 0.18em;
            text-shadow: 0 0 25px rgba(77, 208, 225, 0.6),
                         0 4px 15px rgba(0, 0, 0, 0.3);
            margin-bottom: 12px;
        }
        
        .subtitle {
            font-size: 1.15em;
            color: var(--ocean-light);
        }
        
        .marine-loader {
            display: flex;
            gap: 20px;
            margin-top: 35px;
            animation: loaderFade 1.1s ease-out 2s forwards;
            opacity: 0;
        }
        
        @keyframes loaderFade {
            to {
                opacity: 1;
            }
        }
        
        .marine-creature {
            font-size: 36px;
            animation: creatureBounce 2s ease-in-out infinite;
        }
        
        .marine-creature:nth-child(1) { animation-delay: 0s; }
        .marine-creature:nth-child(2) { animation-delay: 0.25s; }
        .marine-creature:nth-child(3) { animation-delay: 0.5s; }
        .marine-creature:nth-child(4) { animation-delay: 0.75s; }
        
        @keyframes creatureBounce {
            0%, 80%, 100% {
                transform: translateY(0) scale(0.8) rotate(-10deg);
                opacity: 0.5;
            }
            40% {
                transform: translateY(-30px) scale(1.2) rotate(10deg);
                opacity: 1;
            }
        }
        
        .loading-text {
            font-size: 1em;
            color: var(--ocean-light);
            opacity: 0;
            animation: textFlow 2s ease-in-out infinite 2.6s;
            margin-top: 22px;
        }
        
        @keyframes textFlow {
            0%, 100% {
                opacity: 0.3;
                letter-spacing: 0.1em;
            }
            50% {
                opacity: 0.9;
                letter-spacing: 0.15em;
            }
        }
    </style>
</head>
<body>
    <div class="ocean-bg">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <span class="seaweed">🌿</span>
        <span class="seaweed">🌿</span>
        <span class="seaweed">🌿</span>
        <span class="seaweed">🌿</span>
    </div>
    
    <div class="main-content">
        <div class="octopus-container">
            <div class="water-ring"></div>
            <div class="water-ring"></div>
            <span class="octopus">🐙</span>
        </div>
        
        <div class="title-section">
            <h1 class="main-title">海底世界</h1>
            <p class="subtitle">探索成长的奥秘</p>
        </div>
        
        <div class="marine-loader">
            <span class="marine-creature">🐠</span>
            <span class="marine-creature">🐟</span>
            <span class="marine-creature">🐡</span>
            <span class="marine-creature">🦀</span>
        </div>
        
        <p class="loading-text">深海探索中...</p>
    </div>
    
    <script>
        setTimeout(() => {
            window.location.href = '/home';
        }, 4800);
    </script>
</body>
</html>
