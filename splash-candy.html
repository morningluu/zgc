<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>糖果乐园 - 甜蜜的成长时光</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        :root {
            --candy-pink: #FF80AB;
            --candy-orange: #FFB74D;
            --candy-yellow: #FFF176;
            --candy-green: #80CBC4;
            --candy-blue: #64B5F6;
            --candy-purple: #BA68C8;
            --candy-red: #EF5350;
            --text-pink: #C2185B;
            --text-purple: #7B1FA2;
        }
        
        body {
            font-family: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
            background: linear-gradient(135deg, #FFE0B2 0%, #F8BBD9 33%, #E1BEE7 66%, #B3E5FC 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            position: relative;
        }
        
        .candy-rain {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .falling-candy {
            position: absolute;
            font-size: 45px;
            animation: candyFall 8s linear infinite;
        }
        
        .falling-candy:nth-child(1) { top: -15%; left: 10%; animation-delay: 0s; }
        .falling-candy:nth-child(2) { top: -10%; left: 25%; animation-delay: -2s; font-size: 38px; }
        .falling-candy:nth-child(3) { top: -12%; left: 45%; animation-delay: -4s; }
        .falling-candy:nth-child(4) { top: -8%; left: 65%; animation-delay: -1s; font-size: 42px; }
        .falling-candy:nth-child(5) { top: -15%; left: 85%; animation-delay: -3s; }
        .falling-candy:nth-child(6) { top: -10%; left: 5%; animation-delay: -5s; font-size: 35px; }
        .falling-candy:nth-child(7) { top: -12%; left: 75%; animation-delay: -6s; }
        
        @keyframes candyFall {
            0% {
                transform: translateY(-50px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                transform: translateY(110vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        .main-content {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 22px;
        }
        
        .lollipop-container {
            position: relative;
            width: 220px;
            height: 220px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .sparkle-ring {
            position: absolute;
            border-radius: 50%;
            animation: ringRotate 5s linear infinite;
        }
        
        .sparkle-ring:nth-child(1) {
            width: 160px;
            height: 160px;
            border: 6px solid transparent;
            border-top-color: var(--candy-pink);
            border-right-color: var(--candy-blue);
            animation-delay: 0s;
        }
        
        .sparkle-ring:nth-child(2) {
            width: 190px;
            height: 190px;
            border: 5px solid transparent;
            border-bottom-color: var(--candy-purple);
            border-left-color: var(--candy-green);
            animation-delay: -1.5s;
            animation-direction: reverse;
        }
        
        @keyframes ringRotate {
            0% {
                transform: rotate(0deg);
                opacity: 0.7;
            }
            50% {
                opacity: 1;
            }
            100% {
                transform: rotate(360deg);
                opacity: 0.7;
            }
        }
        
        .lollipop {
            font-size: 160px;
            animation: lollipopPop 2.8s cubic-bezier(0.68, -0.55, 0.265, 1.55) forwards, 
                       lollipopSpin 10s linear infinite 2.8s;
            filter: drop-shadow(0 12px 35px rgba(255, 128, 171, 0.4));
        }
        
        @keyframes lollipopPop {
            0% {
                transform: scale(0) rotate(-45deg);
                opacity: 0;
            }
            50% {
                transform: scale(1.3) rotate(20deg);
            }
            100% {
                transform: scale(1) rotate(0deg);
                opacity: 1;
            }
        }
        
        @keyframes lollipopSpin {
            0%, 100% {
                transform: rotate(-5deg);
            }
            25% {
                transform: rotate(5deg);
            }
            50% {
                transform: rotate(-5deg);
            }
            75% {
                transform: rotate(5deg);
            }
        }
        
        .title-area {
            animation: titleBounceIn 1.6s ease-out 1.2s forwards;
            opacity: 0;
            transform: translateY(50px);
        }
        
        @keyframes titleBounceIn {
            0% {
                opacity: 0;
                transform: translateY(50px);
            }
            60% {
                opacity: 1;
                transform: translateY(-10px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .main-title {
            font-size: 3.1em;
            background: linear-gradient(45deg, var(--candy-pink), var(--candy-purple), var(--candy-blue), var(--candy-green));
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            letter-spacing: 0.15em;
            animation: gradientFlow 4s ease infinite;
            margin-bottom: 10px;
            text-shadow: 0 4px 20px rgba(255, 128, 171, 0.3);
        }
        
        @keyframes gradientFlow {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }
        
        .subtitle {
            font-size: 1.1em;
            color: var(--text-purple);
        }
        
        .candy-loader {
            display: flex;
            gap: 18px;
            margin-top: 30px;
            animation: loaderPopIn 1s ease-out 1.8s forwards;
            opacity: 0;
        }
        
        @keyframes loaderPopIn {
            to {
                opacity: 1;
            }
        }
        
        .candy-item {
            font-size: 34px;
            animation: candyBounce 1.8s ease-in-out infinite;
        }
        
        .candy-item:nth-child(1) { animation-delay: 0s; }
        .candy-item:nth-child(2) { animation-delay: 0.2s; }
        .candy-item:nth-child(3) { animation-delay: 0.4s; }
        .candy-item:nth-child(4) { animation-delay: 0.6s; }
        
        @keyframes candyBounce {
            0%, 80%, 100% {
                transform: translateY(0) scale(0.8);
                opacity: 0.6;
            }
            40% {
                transform: translateY(-28px) scale(1.2);
                opacity: 1;
            }
        }
        
        .loading-hint {
            font-size: 1em;
            color: #AD1457;
            opacity: 0;
            animation: hintWiggle 2s ease-in-out infinite 2.5s;
            margin-top: 20px;
        }
        
        @keyframes hintWiggle {
            0%, 100% {
            opacity: 0.4;
            transform: rotate(-2deg);
        }
        25% {
            opacity: 0.8;
            transform: rotate(2deg);
        }
        50% {
            opacity: 0.4;
            transform: rotate(-2deg);
        }
        75% {
            opacity: 0.8;
            transform: rotate(2deg);
        }
    </style>
</head>
<body>
    <div class="candy-rain">
        <span class="falling-candy">🍬</span>
        <span class="falling-candy">🍭</span>
        <span class="falling-candy">🍫</span>
        <span class="falling-candy">🍩</span>
        <span class="falling-candy">🧁</span>
        <span class="falling-candy">🍪</span>
        <span class="falling-candy">🍬</span>
    </div>
    
    <div class="main-content">
        <div class="lollipop-container">
            <div class="sparkle-ring"></div>
            <div class="sparkle-ring"></div>
            <span class="lollipop">🍭</span>
        </div>
        
        <div class="title-area">
            <h1 class="main-title">糖果乐园</h1>
            <p class="subtitle">甜蜜的成长时光</p>
        </div>
        
        <div class="candy-loader">
            <span class="candy-item">🍬</span>
            <span class="candy-item">🍭</span>
            <span class="candy-item">🍫</span>
            <span class="candy-item">🍩</span>
        </div>
        
        <p class="loading-hint">甜蜜加载中...</p>
    </div>
    
    <script>
        setTimeout(() => {
            window.location.href = '/home';
        }, 4200);
    </script>
</body>
</html>
