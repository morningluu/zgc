<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>相册 - 赵高钏的成长手册</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌱</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #FFB5C2; --pink-deep: #FF9AB2; --pink-light: #FFE0E8;
            --purple: #C8B8E8; --purple-deep: #B8A9D4; --purple-light: #E8E0F5;
            --blue: #B5D8F7; --blue-light: #E0F0F8; --green: #B5E8D5; --green-light: #E0F5EB;
            --yellow: #FFE8C0; --yellow-light: #FFF8E8; --text-primary: #5D4E6D;
            --text-secondary: #8B7D9B; --text-light: #9B8DAB; --card-bg: rgba(255,255,255,0.78);
            --nav-bg: rgba(255,252,248,0.94); --shadow-sm: 0 4px 16px rgba(180,160,200,0.08);
            --shadow-md: 0 8px 28px rgba(180,160,200,0.13); --shadow-lg: 0 16px 44px rgba(180,160,200,0.18);
            --radius-xl: 28px; --radius-lg: 22px; --radius-md: 16px; --radius-sm: 12px;
            --transition-bounce: cubic-bezier(0.34,1.56,0.64,1); --transition-smooth: cubic-bezier(0.4,0,0.2,1);
            --accent-color: #E8788A; --skeleton-base: #f0f0f0; --skeleton-shine: #e8e8e8;
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        html,body,div,p,span,h1,h2,h3,h4,a,button { -webkit-user-select:none!important; user-select:none!important; -webkit-touch-callout:none!important; }
        input,textarea { -webkit-user-select:text!important; user-select:text!important; }
        body { font-family:"Noto Sans SC",sans-serif; background:linear-gradient(175deg,#FFF8F5 0%,#FEF5F8 8%,#F8F0FF 22%,#F5F0FA 35%,#F0F5FB 50%,#F5F8F5 65%,#FFFBF0 78%,#FFF8F5 100%); background-attachment:fixed; color:var(--text-primary); min-height:100vh; overflow-x:hidden; -webkit-tap-highlight-color:transparent; -webkit-font-smoothing:antialiased; padding-bottom:100px; position:relative; }

        @keyframes skeleton-shimmer-vertical {
            0% { background-position:0 200%; }
            100% { background-position:0 -200%; }
        }
        .skeleton-shimmer {
            background:linear-gradient(180deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%);
            background-size:100% 200%;
            animation:skeleton-shimmer-vertical 1.5s ease-in-out infinite;
        }

        .bg-decorations { position:fixed; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:0; overflow:hidden; }
        .cloud { position:absolute; background:rgba(255,255,255,0.55); border-radius:50%; filter:blur(30px); animation:cloudFloatPage linear infinite; will-change:transform; }
        .cloud:nth-child(1) { width:180px; height:90px; top:6%; left:-5%; animation-duration:28s; opacity:0.5; }
        .cloud:nth-child(2) { width:140px; height:70px; top:18%; right:-8%; animation-duration:34s; animation-delay:-12s; opacity:0.45; }
        .cloud:nth-child(3) { width:200px; height:100px; top:55%; left:30%; animation-duration:38s; animation-delay:-20s; opacity:0.35; }
        .cloud:nth-child(4) { width:120px; height:60px; top:72%; right:15%; animation-duration:30s; animation-delay:-6s; opacity:0.4; }
        @keyframes cloudFloatPage { 0%{transform:translateX(0) translateY(0)} 25%{transform:translateX(40px) translateY(-18px)} 50%{transform:translateX(10px) translateY(-6px)} 75%{transform:translateX(-20px) translateY(-22px)} 100%{transform:translateX(0) translateY(0)} }
        .sparkle { position:absolute; width:4px; height:4px; background:#FFD8A8; border-radius:50%; animation:sparkleFloatPage 5s ease-in-out infinite; box-shadow:0 0 8px 2px rgba(255,216,168,0.6); will-change:transform,opacity; }
        .sparkle:nth-child(5) { top:12%; left:18%; animation-delay:0s; background:#FFE0C0; box-shadow:0 0 10px 3px rgba(255,224,192,0.7); width:5px; height:5px; }
        .sparkle:nth-child(6) { top:25%; left:75%; animation-delay:-1.8s; background:#FFD4B8; box-shadow:0 0 7px 2px rgba(255,212,184,0.55); width:3px; height:3px; }
        .sparkle:nth-child(7) { top:48%; left:8%; animation-delay:-3.2s; background:#FFECD0; box-shadow:0 0 9px 3px rgba(255,236,208,0.65); }
        .sparkle:nth-child(8) { top:68%; left:82%; animation-delay:-4.5s; background:#FFE8CC; box-shadow:0 0 6px 2px rgba(255,232,204,0.5); width:3px; height:3px; }
        @keyframes sparkleFloatPage { 0%,100%{opacity:0.3;transform:translateY(0) scale(1)} 30%{opacity:1;transform:translateY(-16px) scale(1.6)} 60%{opacity:0.45;transform:translateY(-6px) scale(0.8)} }

        .top-bar { position:sticky; top:0; z-index:1000; background:rgba(255,255,255,0.7); backdrop-filter:blur(22px); border-bottom:1px solid rgba(200,180,220,0.1); padding:0 16px; height:56px; display:flex; align-items:center; justify-content:space-between; }
        .top-bar-left { display:flex; align-items:center; gap:10px; }
        .top-bar-back { width:36px; height:36px; border-radius:50%; background:rgba(200,180,220,0.15); border:none; cursor:pointer; font-size:1.2em; display:flex; align-items:center; justify-content:center; color:var(--text-primary); transition:all 0.3s var(--transition-bounce); text-decoration:none; }
        .top-bar-back:active { transform:scale(0.85); background:rgba(200,180,220,0.3); }
        .top-bar-title { font-family:"ZCOOL KuaiLe", sans-serif; font-size:1.15em; font-weight:700; background:linear-gradient(135deg,#E8788A,#B8A9D4); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; letter-spacing:0.04em; }
        .top-bar-mine { width:38px; height:38px; border-radius:50%; border:none; background:rgba(200,180,220,0.12); cursor:pointer; font-size:1.3em; display:flex; align-items:center; justify-content:center; transition:all 0.3s var(--transition-bounce); color:var(--text-primary); }
        .top-bar-mine:active { transform:scale(0.88); background:rgba(200,180,220,0.25); }

        .sidebar-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.35); z-index:2000; opacity:0; pointer-events:none; transition:opacity 0.35s var(--transition-smooth); }
        .sidebar-overlay.active { opacity:1; pointer-events:auto; }
        .sidebar-panel { position:fixed; top:0; right:-290px; width:270px; max-width:78vw; height:100%; background:rgba(255,255,255,0.96); backdrop-filter:blur(20px); z-index:2001; transition:right 0.4s var(--transition-smooth); padding:24px 20px; display:flex; flex-direction:column; border-radius:var(--radius-xl) 0 0 var(--radius-xl); box-shadow:-8px 0 36px rgba(0,0,0,0.1); }
        .sidebar-panel.active { right:0; }
        .sidebar-close { align-self:flex-end; width:36px; height:36px; border-radius:50%; border:none; background:rgba(200,180,220,0.15); cursor:pointer; font-size:1.2em; display:flex; align-items:center; justify-content:center; color:var(--text-primary); }
        .sidebar-close:active { transform:scale(0.85); }
        .sidebar-avatar { width:70px; height:70px; border-radius:50%; background:linear-gradient(135deg,#FFE0E8,#FFB5C2,#E8E0F5); margin:0 auto 12px; display:flex; align-items:center; justify-content:center; font-size:2.2em; box-shadow:0 6px 24px rgba(255,181,194,0.3); }
        .sidebar-username { font-family:"ZCOOL KuaiLe", sans-serif; font-size:1.2em; text-align:center; margin-bottom:20px; color:var(--text-primary); }
        .sidebar-links { display:flex; flex-direction:column; gap:6px; }
        .sidebar-link { display:flex; align-items:center; gap:10px; padding:13px 16px; border-radius:var(--radius-md); text-decoration:none; color:var(--text-primary); font-weight:500; transition:all 0.3s var(--transition-smooth); }
        .sidebar-link:hover { background:rgba(255,180,190,0.15); }
        .sidebar-link:active { transform:scale(0.96); background:rgba(255,180,190,0.25); }

        .toast-message { position:fixed; bottom:28%; left:50%; transform:translateX(-50%); background:rgba(80,60,90,0.82); color:white; padding:10px 22px; border-radius:40px; font-size:0.9rem; z-index:10000; pointer-events:none; backdrop-filter:blur(10px); transition:opacity 0.3s; opacity:0; letter-spacing:0.03em; }
        .toast-message.show { opacity:1; }

        .container { max-width:600px; margin:0 auto; padding:16px 18px 20px; position:relative; z-index:1; }

        .slideshow-card { background:var(--card-bg); backdrop-filter:blur(12px); border-radius:var(--radius-xl); overflow:hidden; box-shadow:var(--shadow-md); margin-bottom:20px; position:relative; height:320px; }
        .slideshow-section { position:relative; width:100%; height:100%; overflow:hidden; }
        .slides-container { display:flex; height:100%; transition:transform 0.4s cubic-bezier(0.2,0.9,0.4,1.1); }
        .slide { min-width:100%; height:100%; background-size:cover; background-position:center; background-color:#FFF8F5; }
        .dots { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); display:flex; gap:8px; z-index:3; }
        .dot { width:8px; height:8px; border-radius:50%; background:rgba(200,180,220,0.5); cursor:pointer; transition:all 0.3s; }
        .dot.active { background:var(--accent-color); box-shadow:0 0 8px rgba(232,120,138,0.4); transform:scale(1.3); }
        .slideshow-empty { display:flex; align-items:center; justify-content:center; height:100%; color:var(--text-light); font-family:"ZCOOL KuaiLe",sans-serif; font-size:1.2em; flex-direction:column; gap:8px; }
        .slideshow-skeleton { position:absolute; top:0; left:0; width:100%; height:100%; z-index:10; border-radius:var(--radius-xl); display:none; pointer-events:none; }

        .gallery-title { font-family:"ZCOOL KuaiLe", sans-serif; font-size:1.4em; color:var(--text-primary); margin-bottom:18px; display:flex; align-items:center; gap:8px; }
        .tl-section { margin-bottom:20px; }
        .tl-header { display:flex; align-items:baseline; gap:8px; padding-bottom:8px; margin-bottom:10px; border-bottom:1px dashed rgba(200,180,220,0.3); font-family:"ZCOOL KuaiLe",sans-serif; font-size:1em; color:var(--accent-color); }
        .tl-header .tl-age { font-size:0.7rem; color:var(--text-light); font-weight:normal; }
        .tl-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:6px; }
        .tl-photo { aspect-ratio:1; border-radius:var(--radius-sm); overflow:hidden; position:relative; cursor:pointer; transition:all 0.3s var(--transition-bounce); box-shadow:var(--shadow-sm); background:linear-gradient(180deg, var(--skeleton-base) 25%, var(--skeleton-shine) 50%, var(--skeleton-base) 75%); background-size:100% 200%; animation:skeleton-shimmer-vertical 1.5s ease-in-out infinite; }
        .tl-photo.img-loaded { background:#f0f0f0; animation:none; }
        .tl-photo:active { transform:scale(0.95); }
        .tl-photo img { width:100%; height:100%; object-fit:cover; display:block; visibility:hidden; transition:visibility 0.3s,opacity 0.3s; position:relative; z-index:1; }
        .tl-photo img.loaded { visibility:visible; opacity:1; }
        .tl-photo .tl-date-tag { position:absolute; bottom:4px; right:4px; background:rgba(0,0,0,0.45); color:white; font-size:0.6em; padding:2px 6px; border-radius:8px; pointer-events:none; z-index:3; }
        .tl-photo .featured-star { position:absolute; top:4px; left:4px; font-size:0.8em; pointer-events:none; text-shadow:0 0 3px rgba(0,0,0,0.3); z-index:3; }
        .photo-actions { position:absolute; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.65); display:flex; flex-direction:column; align-items:center; justify-content:center; gap:12px; opacity:0; transition:opacity 0.25s; pointer-events:none; border-radius:var(--radius-sm); z-index:4; }
        .tl-photo.long-press .photo-actions { opacity:1; pointer-events:auto; }
        .pa-btn { background:rgba(255,255,255,0.9); border:none; color:var(--text-primary); padding:10px 22px; border-radius:30px; font-size:0.85rem; font-weight:600; cursor:pointer; white-space:nowrap; min-width:100px; text-align:center; box-shadow:0 2px 8px rgba(0,0,0,0.15); transition:all 0.2s var(--transition-bounce); }
        .pa-btn.danger { color:var(--accent-color); }
        .pa-btn:active { transform:scale(0.92); }

        .photo-viewer { position:fixed; top:0; left:0; width:100%; height:100%; background:#000; z-index:3000; display:none; flex-direction:column; touch-action:pan-y; }
        .photo-viewer.active { display:flex; }
        .viewer-track-container { flex:1; position:relative; overflow:hidden; }
        .viewer-track { display:flex; height:100%; will-change:transform; transition:transform 0.35s cubic-bezier(0.2,0.9,0.4,1.1); }
        .viewer-slide { min-width:100vw; display:flex; align-items:center; justify-content:center; padding:40px 20px; }
        .viewer-slide img { max-width:95vw; max-height:80vh; object-fit:contain; border-radius:8px; pointer-events:auto; }
        .viewer-info-top { position:absolute; top:24px; left:20px; z-index:15; color:white; background:rgba(0,0,0,0.5); backdrop-filter:blur(10px); padding:6px 14px; border-radius:30px; max-width:70%; pointer-events:none; }
        .viewer-desc-left { position:absolute; bottom:120px; left:20px; z-index:15; color:rgba(255,255,255,0.9); background:rgba(0,0,0,0.4); backdrop-filter:blur(8px); padding:6px 14px; border-radius:24px; font-size:0.8rem; max-width:70%; pointer-events:none; }
        .viewer-close { position:absolute; top:18px; right:18px; background:rgba(255,255,255,0.25); border:none; color:white; font-size:1.3em; width:40px; height:40px; border-radius:50%; cursor:pointer; z-index:20; display:flex; align-items:center; justify-content:center; }
        .viewer-nav { position:absolute; top:50%; transform:translateY(-50%); background:rgba(255,255,255,0.2); border:none; color:white; font-size:2em; width:44px; height:44px; border-radius:50%; cursor:pointer; z-index:20; display:flex; align-items:center; justify-content:center; }
        .viewer-nav.prev { left:16px; }
        .viewer-nav.next { right:16px; }
        .viewer-actions { position:absolute; bottom:30px; left:50%; transform:translateX(-50%); display:flex; gap:12px; z-index:20; }
        .va-btn { background:rgba(30,30,40,0.8); backdrop-filter:blur(12px); border:1px solid rgba(255,255,255,0.25); color:white; padding:10px 20px; border-radius:40px; font-size:0.9rem; font-weight:600; cursor:pointer; white-space:nowrap; transition:all 0.2s var(--transition-bounce); }
        .va-btn:active { transform:scale(0.93); }

        .form-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:5000; display:flex; align-items:center; justify-content:center; opacity:0; pointer-events:none; transition:opacity 0.35s; }
        .form-overlay.active { opacity:1; pointer-events:auto; }
        .form-card { background:white; border-radius:var(--radius-xl); padding:28px 22px; width:90vw; max-width:420px; max-height:85vh; overflow-y:auto; box-shadow:0 20px 40px rgba(0,0,0,0.2); }
        .form-card h3 { font-family:"ZCOOL KuaiLe", sans-serif; text-align:center; margin-bottom:6px; font-size:1.3em; color:var(--accent-color); }
        .form-subtitle { text-align:center; color:var(--text-light); font-size:0.8em; margin-bottom:20px; }
        .field-group { margin-bottom:16px; }
        .field-label { font-size:0.85em; font-weight:600; color:var(--text-secondary); margin-bottom:6px; }
        .form-card input, .form-card textarea { width:100%; padding:12px 14px; border:1.5px solid #f0e6f6; border-radius:20px; font-family:inherit; font-size:0.95em; background:#FFFAFD; outline:none; }
        .file-upload-box { padding:20px; border:2px dashed #FFD4E0; border-radius:20px; text-align:center; background:#FFF5F8; cursor:pointer; position:relative; }
        .file-upload-box input { position:absolute; top:0; left:0; width:100%; height:100%; opacity:0; cursor:pointer; }
        .btn-submit { width:100%; padding:14px; background:linear-gradient(135deg, #FFB5C2, #FF9AB2); border:none; border-radius:40px; color:white; font-weight:700; font-size:1em; cursor:pointer; transition:all 0.3s; }
        .btn-submit:active { transform:scale(0.96); }
        .file-names { font-size:0.75rem; color:var(--accent-color); margin-top:6px; display:none; }

        .bottom-nav { position:fixed; bottom:0; left:0; right:0; z-index:1000; background:var(--nav-bg); backdrop-filter:blur(24px); border-top:1px solid rgba(200,180,220,0.1); border-radius:var(--radius-xl) var(--radius-xl) 0 0; display:flex; align-items:center; justify-content:space-around; padding:6px 8px 12px; box-shadow:0 -6px 28px rgba(180,160,200,0.1); padding-bottom:max(12px, env(safe-area-inset-bottom)); }
        .bottom-nav-item { display:flex; flex-direction:column; align-items:center; gap:2px; text-decoration:none; color:var(--text-light); font-size:0.68em; font-weight:500; padding:6px 10px; border-radius:var(--radius-md); transition:all 0.3s var(--transition-bounce); cursor:pointer; border:none; background:none; font-family:inherit; position:relative; }
        .bottom-nav-item .nav-icon { font-size:1.5em; transition:transform 0.3s var(--transition-bounce); }
        .bottom-nav-item.active { color:var(--accent-color); font-weight:700; }
        .bottom-nav-item.active::after { content:''; position:absolute; bottom:-2px; width:22px; height:3px; border-radius:3px; background:var(--accent-color); }
        .bottom-nav-item:active { transform:scale(0.85); }
        .bottom-nav-add { position:relative; top:-22px; width:52px; height:52px; border-radius:50%; background:linear-gradient(135deg, #FFB5C2, #FF9AB2); border:4px solid rgba(255,255,255,0.85); box-shadow:0 8px 26px rgba(255,154,178,0.45); display:flex; align-items:center; justify-content:center; font-size:1.6em; color:white; cursor:pointer; transition:all 0.35s var(--transition-bounce); z-index:5; animation:addBtnBreathe 2.5s ease-in-out infinite; }
        @keyframes addBtnBreathe { 0%,100%{box-shadow:0 8px 26px rgba(255,154,178,0.45)} 50%{box-shadow:0 14px 36px rgba(255,154,178,0.65)} }
        .bottom-nav-add:active { transform:scale(0.78) rotate(45deg); }
        .bottom-nav-add-label { position:absolute; bottom:-24px; font-size:0.65em; color:var(--accent-color); font-weight:700; white-space:nowrap; letter-spacing:0.04em; }
        #backToTop { position:fixed; bottom:110px; right:20px; z-index:999; width:40px; height:40px; border-radius:50%; border:none; background:rgba(255,255,255,0.85); box-shadow:var(--shadow-sm); font-size:1.1em; cursor:pointer; display:none; align-items:center; justify-content:center; color:var(--text-primary); backdrop-filter:blur(8px); }
        #backToTop:hover { transform:scale(1.12); }
        #backToTop:active { transform:scale(0.85); }

        @media (max-width:600px) {
            .tl-grid { grid-template-columns:repeat(3,1fr); gap:4px; }
            .tl-photo { border-radius:10px; }
            .viewer-nav { display:none!important; }
            .slideshow-card { height:260px; border-radius:var(--radius-lg); }
            .slideshow-skeleton { border-radius:var(--radius-lg); }
            .bottom-nav-add { width:46px; height:46px; top:-18px; font-size:1.4em; }
            .bottom-nav-add-label { bottom:-20px; font-size:0.6em; }
            .container { padding:10px 12px 16px; }
            .bottom-nav-item .nav-icon { font-size:1.35em; }
        }
    </style>
</head>
<body>
<div class="bg-decorations"><div class="cloud"></div><div class="cloud"></div><div class="cloud"></div><div class="cloud"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div><div class="sparkle"></div></div>
<div class="toast-message" id="toastMsg">提示</div>

<header class="top-bar">
    <div class="top-bar-left">
        <a href="/" class="top-bar-back" aria-label="返回首页">←</a>
        <span class="top-bar-title">📷 相册</span>
    </div>
    <button class="top-bar-mine" onclick="toggleSidebar()" aria-label="我的">👤</button>
</header>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<aside class="sidebar-panel" id="sidebarPanel">
    <button class="sidebar-close" onclick="toggleSidebar()">✕</button>
    <div class="sidebar-avatar">🧸</div>
    <div class="sidebar-username" sec:authorize="isAuthenticated()"><span sec:authentication="name">用户</span></div>
    <div class="sidebar-username" sec:authorize="!isAuthenticated()">访客</div>
    <div class="sidebar-links">
        <a sec:authorize="!isAuthenticated()" href="/login" class="sidebar-link">🔐 登录账号</a>
        <a sec:authorize="isAuthenticated()" href="/logout" class="sidebar-link">🚪 退出登录</a>
        <a href="/gallery" class="sidebar-link">📷 相册图集</a>
        <a href="/growth" class="sidebar-link">📊 成长数据</a>
        <a href="/messages" class="sidebar-link">💌 家人留言</a>
    </div>
</aside>

<main class="container">
    <div class="slideshow-card" id="slideshowCard">
        <div class="slideshow-section" id="slideshowSection">
            <div class="slides-container" id="slidesContainer"></div>
            <div class="dots" id="dotsContainer"></div>
        </div>
        <div class="skeleton-shimmer slideshow-skeleton" id="slideshowSkeleton"></div>
        <div th:if="${#lists.isEmpty(records)}" class="slideshow-empty"><span style="font-size:3em;">📸</span><span>还没有照片，快来添加第一张吧~</span></div>
    </div>
    <div class="gallery-title">📂 全部照片</div>
    <div th:if="${#lists.isEmpty(records)}" style="text-align:center;padding:40px;color:var(--text-light);">🖼️ 相册是空的</div>
    <div id="timelineContent"></div>
</main>

<div class="photo-viewer" id="photoViewer">
    <button class="viewer-close" id="viewerCloseBtn">✕</button>
    <button class="viewer-nav prev" onclick="viewerPrev()">‹</button>
    <button class="viewer-nav next" onclick="viewerNext()">›</button>
    <div class="viewer-info-top" id="viewerInfoTop"><div class="vi-title" id="viewerTitle"></div><div class="vi-date" id="viewerDate"></div></div>
    <div class="viewer-track-container"><div class="viewer-track" id="viewerTrack"></div></div>
    <div class="viewer-desc-left" id="viewerDesc"></div>
    <div class="viewer-actions" id="viewerActions">
        <button class="va-btn download" id="downloadBtn">⬇️ 下载</button>
        <button class="va-btn featured" id="featuredBtn">⭐ 设为精选</button>
        <button class="va-btn danger" id="deleteBtn" sec:authorize="isAuthenticated()">🗑 删除</button>
    </div>
</div>

<div class="form-overlay" id="addFormOverlay" onclick="if(event.target===this)closeAddForm()">
    <div class="form-card">
        <h3>✨ 添加新照片</h3>
        <p class="form-subtitle">可一次选择多张照片，自动压缩后上传</p>
        <div class="field-group"><div class="field-label">📝 照片标题 <span style="font-weight:normal;color:var(--text-light);">(选填)</span></div><input type="text" id="batchTitle" placeholder="如：宝宝第一次走路"></div>
        <div class="field-group"><div class="field-label">💬 照片描述 <span style="font-weight:normal;color:var(--text-light);">(选填)</span></div><textarea id="batchDesc" rows="2" placeholder="记录下这一刻的美好..."></textarea></div>
        <div class="field-group"><div class="field-label">📅 拍摄日期 <span style="color:var(--accent-color);">*必填</span></div><input type="date" id="batchDate" required></div>
        <div class="field-group"><div class="field-label">🖼️ 选择照片 <span style="color:var(--accent-color);">*必填 (可多选)</span></div><div class="file-upload-box"><input type="file" id="batchFiles" accept="image/*" multiple onchange="handleFilesSelect(this)">📷 点击选择照片（可多选）</div><div class="file-names" id="fileNamesDisplay"></div><div id="compressProgress" style="font-size:0.7rem;color:#5DCFA0;display:none;margin-top:6px;">压缩中...</div></div>
        <button class="btn-submit" id="uploadBtn" onclick="submitBatchPhotos()">✨ 发布照片</button>
    </div>
</div>

<nav class="bottom-nav">
    <a href="/" class="bottom-nav-item"><span class="nav-icon">🏠</span><span>首页</span></a>
    <a href="/gallery" class="bottom-nav-item active"><span class="nav-icon">📷</span><span>相册</span></a>
    <button class="bottom-nav-add" onclick="handleAddClick()" aria-label="添加照片">
        <span>+</span>
        <span class="bottom-nav-add-label">添加</span>
    </button>
    <a href="/growth" class="bottom-nav-item"><span class="nav-icon">📊</span><span>数据</span></a>
    <a href="/messages" class="bottom-nav-item"><span class="nav-icon">💌</span><span>留言</span></a>
</nav>

<button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})" aria-label="回到顶部">⬆</button>

<script th:inline="javascript">
    /*<![CDATA[*/
    var rawRecords = /*[[${records}]]*/ [];
    var isAuthenticated = /*[[${#authorization.expression('isAuthenticated()')}]]*/ false;
    var records = rawRecords.slice().sort((a,b)=>(a.recordDate===b.recordDate?(b.id||0)-(a.id||0):(b.recordDate||'').localeCompare(a.recordDate||'')));
    var BIRTHDAY = new Date(2017,1,24);
    
    function showToast(msg){var t=document.getElementById('toastMsg');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),1500);}
    function toggleSidebar(){var o=document.getElementById('sidebarOverlay'),p=document.getElementById('sidebarPanel');if(o.classList.contains('active')){o.classList.remove('active');p.classList.remove('active');document.body.style.overflow='';}else{o.classList.add('active');p.classList.add('active');document.body.style.overflow='hidden';}}
    function getAgeFromDate(d){if(!d)return'';var p=d.split('-');if(p.length!==3)return'';var rd=new Date(p[0],p[1]-1,p[2]);var y=rd.getFullYear()-BIRTHDAY.getFullYear();var m=rd.getMonth()-BIRTHDAY.getMonth();if(m<0){y--;m+=12;}if(y<0)return'';return y+'岁'+m+'个月';}
    function getAgeForMonth(recs){return recs&&recs.length?getAgeFromDate(recs[0].recordDate):'';}

    // ✅ 统一权限检查
    function requireAuth(action) {
        if (!isAuthenticated) {
            showToast('请先登录');
            setTimeout(() => { window.location.href = '/login'; }, 600);
            return false;
        }
        return true;
    }
    
    // ✅ +号按钮点击处理
    function handleAddClick() {
        if (!requireAuth()) return;
        openAddForm();
    }
    
    // ✅ 长按操作也需要检查登录
    function checkAuthThen(callback) {
        if (!requireAuth()) return;
        callback();
    }

    var featuredRecords = records.filter(r=>r.featured);
    var slideshowRecords = featuredRecords.length>0?featuredRecords:records;
    var originalSlideCount = slideshowRecords.length;
    var currentSlideIndex=1,autoTimer=null;

    function buildSlideshowContent(){
        var c=document.getElementById('slidesContainer'),d=document.getElementById('dotsContainer');
        if(!c||originalSlideCount===0)return;
        c.innerHTML='';d.innerHTML='';
        var last=slideshowRecords[originalSlideCount-1],first=slideshowRecords[0];
        var sl=document.createElement('div');sl.className='slide';if(last.photoPath)sl.style.backgroundImage='url("'+last.photoPath+'")';c.appendChild(sl);
        for(var i=0;i<originalSlideCount;i++){var r=slideshowRecords[i];var s=document.createElement('div');s.className='slide';if(r.photoPath)s.style.backgroundImage='url("'+r.photoPath+'")';c.appendChild(s);}
        var sf=document.createElement('div');sf.className='slide';if(first.photoPath)sf.style.backgroundImage='url("'+first.photoPath+'")';c.appendChild(sf);
        for(var j=0;j<originalSlideCount;j++){var dot=document.createElement('span');dot.className='dot'+(j===0?' active':'');dot.onclick=(idx=>()=>goToRealSlide(idx))(j);d.appendChild(dot);}
        c.style.transition='none';c.style.transform='translateX(-100%)';c.offsetHeight;c.style.transition='transform 0.4s cubic-bezier(0.2,0.9,0.4,1.1)';
        updateSlideDots(0);document.getElementById('slideshowSkeleton').style.display='none';
    }
    function updateSlideDots(idx){document.querySelectorAll('#dotsContainer .dot').forEach((d,i)=>d.classList.toggle('active',i===idx));}
    function getRealIndexFromVisual(v){if(v===0)return originalSlideCount-1;if(v===originalSlideCount+1)return 0;return v-1;}
    function setSlideTransform(vis,anim){var c=document.getElementById('slidesContainer');if(!c)return;if(!anim)c.style.transition='none';c.style.transform='translateX(-'+(vis*100)+'%)';if(!anim){c.offsetHeight;c.style.transition='transform 0.4s cubic-bezier(0.2,0.9,0.4,1.1)';}updateSlideDots(getRealIndexFromVisual(vis));currentSlideIndex=vis;}
    function goToRealSlide(idx){if(idx<0||idx>=originalSlideCount)return;setSlideTransform(idx+1,true);resetAutoPlay();}
    function nextSlide(){if(originalSlideCount<=1)return;var n=currentSlideIndex+1;if(n>originalSlideCount+1){setSlideTransform(1,false);setTimeout(()=>setSlideTransform(2,true),20);}else setSlideTransform(n,true);resetAutoPlay();}
    function prevSlide(){if(originalSlideCount<=1)return;var p=currentSlideIndex-1;if(p<0){setSlideTransform(originalSlideCount+1,false);setTimeout(()=>setSlideTransform(originalSlideCount,true),20);}else setSlideTransform(p,true);resetAutoPlay();}
    function resetAutoPlay(){if(autoTimer)clearInterval(autoTimer);if(originalSlideCount>1)autoTimer=setInterval(()=>{if(!document.hidden)nextSlide();},4000);}
    function buildSlideshow(){
        if(originalSlideCount===0){
            document.getElementById('slideshowSkeleton').style.display='none';
            return;
        }
        document.getElementById('slideshowSkeleton').style.display='block';
        buildSlideshowContent();
    }

    var slideshowEl=document.getElementById('slideshowSection');
    if(slideshowEl&&originalSlideCount>0){slideshowEl.addEventListener('touchstart',function(e){this.tx=e.touches[0].clientX;this.ty=e.touches[0].clientY;});slideshowEl.addEventListener('touchend',function(e){var dx=this.tx-e.changedTouches[0].clientX,dy=this.ty-e.changedTouches[0].clientY;if(Math.abs(dx)>Math.abs(dy)&&Math.abs(dx)>40){dx>0?nextSlide():prevSlide();}});}

    function renderFullGallery(){
        var groups={};records.forEach(r=>{var d=r.recordDate;if(!d)return;var y=d.substring(0,4),m=d.substring(5,7),ym=y+'年'+parseInt(m)+'月';if(!groups[ym])groups[ym]=[];groups[ym].push(r);});
        var keys=Object.keys(groups).sort((a,b)=>{var na=parseInt(a)*12+parseInt(a.match(/\d+/g)[1]);var nb=parseInt(b)*12+parseInt(b.match(/\d+/g)[1]);return nb-na;});
        var html='';var imgCounter=0;
        keys.forEach(k=>{var age=getAgeForMonth(groups[k]);html+='<div class="tl-section"><div class="tl-header">'+k+' · '+groups[k].length+' 张'+(age?'<span class="tl-age">('+age+')</span>':'')+'</div><div class="tl-grid">';
        groups[k].forEach(r=>{var src=r.photoPath||'',dd=r.recordDate?r.recordDate.substring(5):'',fid=r.id;
            var imgTag;
            if (imgCounter < 6 && src) {
                imgTag = '<img src="'+src+'" class="loaded" onload="onPhotoLoad(this)" onerror="onPhotoError(this)">';
            } else {
                imgTag = '<img class="lazy-img" data-src="'+src+'" onload="onPhotoLoad(this)" onerror="onPhotoError(this)">';
            }
            imgCounter++;
            // ✅ 长按菜单按钮也需要登录检查
            var actionsHtml = isAuthenticated ? 
                '<button class="pa-btn featured" onclick="event.stopPropagation();toggleFeaturedById('+fid+')">'+(r.featured?'取消精选':'⭐ 精选')+'</button><button class="pa-btn danger" onclick="event.stopPropagation();deleteById('+fid+')">🗑 删除</button>' :
                '';
            html+='<div class="tl-photo" data-id="'+fid+'" onclick="openViewer('+fid+')">'+imgTag+(r.featured?'<span class="featured-star">⭐</span>':'')+'<span class="tl-date-tag">'+dd+'</span>'+(actionsHtml?'<div class="photo-actions" onclick="event.stopPropagation();">'+actionsHtml+'</div>':'')+'</div>';
        });
        html+='</div></div>';});
        document.getElementById('timelineContent').innerHTML=html;
        var observer=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){var img=e.target,src=img.getAttribute('data-src');if(src){img.src=src;img.classList.add('loaded');img.removeAttribute('data-src');}observer.unobserve(img);}})},{rootMargin:'100px'});
        document.querySelectorAll('.lazy-img').forEach(img=>observer.observe(img));
        document.querySelectorAll('.tl-photo').forEach(p=>{var timer;p.addEventListener('touchstart',()=>{timer=setTimeout(()=>p.classList.add('long-press'),600);});p.addEventListener('touchend',()=>clearTimeout(timer));p.addEventListener('touchmove',()=>{clearTimeout(timer);p.classList.remove('long-press');});});
        document.addEventListener('click',e=>{if(!e.target.closest('.tl-photo'))document.querySelectorAll('.tl-photo').forEach(p=>p.classList.remove('long-press'));});
    }
    window.onPhotoLoad=function(img){img.classList.add('loaded');var p=img.closest('.tl-photo');if(p)p.classList.add('img-loaded');};
    window.onPhotoError=function(img){var p=img.closest('.tl-photo');if(p)p.classList.add('img-loaded');};

    var viewerTrack=document.getElementById('viewerTrack'),viewerIndex=0,viewerOpen=false,startX=0,savedScrollY=0;
    function updateViewerInfo(){var r=records[viewerIndex];if(!r)return;document.getElementById('viewerTitle').innerText=r.title||'';document.getElementById('viewerDate').innerText=r.recordDate||'';document.getElementById('viewerDesc').innerText=r.description||'';document.getElementById('featuredBtn').innerText=r.featured?'⭐ 取消精选':'⭐ 设为精选';}
    function buildViewerSlide(index){viewerTrack.innerHTML='';var s=document.createElement('div');s.className='viewer-slide';var img=document.createElement('img');img.src=records[index].photoPath||'';img.draggable=false;s.appendChild(img);viewerTrack.appendChild(s);}
    function setViewerPosition(index,animate){if(index<0)index=0;if(index>=records.length)index=records.length-1;viewerIndex=index;buildViewerSlide(index);viewerTrack.style.transition=animate?'transform 0.35s cubic-bezier(0.2,0.9,0.4,1.1)':'none';viewerTrack.style.transform='translateX(0)';updateViewerInfo();}
    window.openViewer=function(id){var idx=records.findIndex(r=>r.id==id);if(idx===-1)return;savedScrollY=window.scrollY;viewerIndex=idx;setViewerPosition(idx,false);document.getElementById('photoViewer').classList.add('active');viewerOpen=true;history.pushState({viewer:true},'');};
    function closeViewer(byPopState=false){if(!viewerOpen)return;document.getElementById('photoViewer').classList.remove('active');viewerOpen=false;if(!byPopState)history.back();else{viewerTrack.style.transition='none';viewerTrack.style.transform='translateX(0)';}setTimeout(()=>window.scrollTo(0,savedScrollY),50);}
    document.getElementById('viewerCloseBtn').onclick=()=>closeViewer();
    window.viewerPrev=()=>{if(viewerIndex>0)setViewerPosition(viewerIndex-1,true);else showToast('已经是第一张了');};
    window.viewerNext=()=>{if(viewerIndex<records.length-1)setViewerPosition(viewerIndex+1,true);else showToast('已经是最后一张了');};
    var viewerContainer=document.getElementById('photoViewer');
    viewerContainer.addEventListener('touchstart',function(e){if(e.target.closest('button'))return;startX=e.touches[0].clientX;viewerTrack.style.transition='none';});
    viewerContainer.addEventListener('touchmove',function(e){if(!startX)return;var dx=e.touches[0].clientX-startX;viewerTrack.style.transform='translateX('+dx+'px)';});
    viewerContainer.addEventListener('touchend',function(e){if(!startX)return;var dx=e.changedTouches[0].clientX-startX;startX=0;if(Math.abs(dx)>window.innerWidth*0.3){dx>0?window.viewerPrev():window.viewerNext();}else{viewerTrack.style.transition='transform 0.35s cubic-bezier(0.2,0.9,0.4,1.1)';viewerTrack.style.transform='translateX(0)';}});
    document.getElementById('downloadBtn').onclick=function(){var r=records[viewerIndex];if(!r||!r.photoPath)return;var a=document.createElement('a');a.href=r.photoPath;a.download=r.title||'photo';a.click();};
   var featuredBtn = document.getElementById('featuredBtn');
if (featuredBtn) {
    featuredBtn.onclick = function() {
        if (!requireAuth()) return;
        var r = records[viewerIndex];
        if (r) toggleFeaturedById(r.id);
    };
}

var deleteBtn = document.getElementById('deleteBtn');
if (deleteBtn) {
    deleteBtn.onclick = function() {
        if (!requireAuth()) return;
        var r = records[viewerIndex];
        if (r) deleteById(r.id);
    };
}

    // ✅ 删除操作需要登录
    window.deleteById=function(id){
        if (!requireAuth()) return;
        if(!confirm('确定删除吗？'))return;
        fetch('/delete/'+id,{method:'POST'}).then(r=>{
            if(r.ok){
                var idx=records.findIndex(r=>r.id==id);
                if(idx!==-1)records.splice(idx,1);
                renderFullGallery();
                featuredRecords=records.filter(r=>r.featured);
                slideshowRecords=featuredRecords.length>0?featuredRecords:records;
                originalSlideCount=slideshowRecords.length;
                buildSlideshow();
                showToast('已删除');
                closeViewer(true);
            }else showToast('删除失败');
        });
    };
    
    // ✅ 精选操作需要登录
    window.toggleFeaturedById=function(id){
        if (!requireAuth()) return;
        fetch('/gallery/toggle-featured/'+id,{method:'POST'}).then(r=>{
            if(r.ok){
                var rec=records.find(r=>r.id==id);
                if(rec)rec.featured=!rec.featured;
                renderFullGallery();
                featuredRecords=records.filter(r=>r.featured);
                slideshowRecords=featuredRecords.length>0?featuredRecords:records;
                originalSlideCount=slideshowRecords.length;
                buildSlideshow();
                showToast(rec.featured?'已设为精选':'已取消精选');
            }
        });
    };

    function openAddForm(){
        document.getElementById('batchFiles').value='';
        document.getElementById('fileNamesDisplay').style.display='none';
        document.getElementById('compressProgress').style.display='none';
        document.getElementById('uploadBtn').innerHTML='✨ 发布照片';
        compressedFiles=[];
        fileHashes.clear();
        document.getElementById('addFormOverlay').classList.add('active');
    }
    function closeAddForm(){document.getElementById('addFormOverlay').classList.remove('active');}

    var compressedFiles=[],fileHashes=new Set();
    function getFileHash(f){return f.name+'|'+f.size+'|'+f.lastModified;}
    function compressImage(file,maxW=1200,qual=0.7){return new Promise((resolve)=>{if(!file.type.match(/image.*/)){resolve(file);return;}var reader=new FileReader();reader.readAsDataURL(file);reader.onload=function(e){var img=new Image();img.src=e.target.result;img.onload=function(){var w=img.width,h=img.height,c=document.createElement('canvas');if(w>maxW){h=(h*maxW)/w;w=maxW;}c.width=w;c.height=h;var ctx=c.getContext('2d');ctx.drawImage(img,0,0,w,h);c.toBlob(blob=>{resolve(new File([blob],file.name.replace(/\.[^/.]+$/,'.jpg'),{type:'image/jpeg'}));},'image/jpeg',qual);};};});}
    window.handleFilesSelect=async function(input){var files=Array.from(input.files);if(!files.length)return;var newFiles=[],dup=0;files.forEach(f=>{var h=getFileHash(f);if(!fileHashes.has(h)){fileHashes.add(h);newFiles.push(f);}else dup++;});if(dup)showToast('已忽略 '+dup+' 个重复');if(!newFiles.length){showToast('没有新照片');return;}document.getElementById('compressProgress').style.display='block';document.getElementById('uploadBtn').disabled=true;var comp=[];for(var f of newFiles){try{comp.push(await compressImage(f));}catch(e){comp.push(f);}}compressedFiles=comp;document.getElementById('compressProgress').style.display='none';document.getElementById('uploadBtn').disabled=false;document.getElementById('fileNamesDisplay').style.display='block';document.getElementById('fileNamesDisplay').textContent='📎 已选择 '+newFiles.length+' 个文件（已压缩）';document.getElementById('uploadBtn').innerHTML='✨ 批量发布 ('+newFiles.length+' 张)';};
    window.submitBatchPhotos=async function(){if(!compressedFiles.length){showToast('请选择照片');return;}var date=document.getElementById('batchDate').value;if(!date){showToast('请选择日期');return;}var title=document.getElementById('batchTitle').value,desc=document.getElementById('batchDesc').value;var proms=compressedFiles.map(f=>{var fd=new FormData();fd.append('title',title);fd.append('description',desc);fd.append('recordDate',date);fd.append('photo',f);return fetch('/gallery/add',{method:'POST',body:fd}).then(r=>r.ok?r.json():null);});var results=await Promise.all(proms);closeAddForm();var newRecs=results.filter(r=>r);if(newRecs.length){records=newRecs.concat(records);renderFullGallery();featuredRecords=records.filter(r=>r.featured);slideshowRecords=featuredRecords.length>0?featuredRecords:records;originalSlideCount=slideshowRecords.length;buildSlideshow();showToast('成功添加 '+newRecs.length+' 张');}else showToast('上传失败');compressedFiles=[];fileHashes.clear();};

    window.addEventListener('scroll',()=>{document.getElementById('backToTop').style.display=window.scrollY>400?'flex':'none';});

    // ========== ✅ 修改后的返回逻辑：优先关闭弹窗/大图，否则由 app.js 接管退出确认 ==========
    (function() {
        if (window.location.pathname === '/' || window.location.pathname === '') return;
        history.replaceState({ subPage: true }, '', window.location.href);

        window.addEventListener('popstate', function(event) {
            // 1. 优先关闭上传照片弹窗
            var addForm = document.getElementById('addFormOverlay');
            if (addForm && addForm.classList.contains('active')) {
                closeAddForm();
                history.pushState({ subPage: true }, '', window.location.href);
                return;
            }

            // 2. 如果全屏查看器正在显示，则关闭查看器
            if (viewerOpen) {
                closeViewer(true);
                event.preventDefault();
                return;
            }

            // 3. 没有打开的弹窗/查看器 → 由 app.js 处理退出确认
            // 这里什么都不做，app.js 会接管 popstate 并弹出确认对话框
        });
    })();

    renderFullGallery();
    buildSlideshow();
    resetAutoPlay();
    /*]]>*/
</script>
<!-- 引入公共导航与退出控制脚本 -->
<script src="/app.js"></script>
</body>
</html>
