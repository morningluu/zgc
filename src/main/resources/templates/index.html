<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赵高钏的成长记录手册</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌱</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --pink: #FFB5C2;
            --pink-deep: #FF9AB2;
            --pink-light: #FFE0E8;
            --purple: #C8B8E8;
            --purple-deep: #B8A9D4;
            --purple-light: #E8E0F5;
            --blue: #B5D8F7;
            --blue-light: #E0F0F8;
            --green: #B5E8D5;
            --green-light: #E0F5EB;
            --yellow: #FFE8C0;
            --yellow-light: #FFF8E8;
            --white-soft: #FFFBF8;
            --text-primary: #5D4E6D;
            --text-secondary: #8B7D9B;
            --text-light: #9B8DAB;
            --card-bg: rgba(255, 255, 255, 0.78);
            --nav-bg: rgba(255, 252, 248, 0.94);
            --shadow-sm: 0 4px 16px rgba(180, 160, 200, 0.08);
            --shadow-md: 0 8px 28px rgba(180, 160, 200, 0.13);
            --shadow-lg: 0 16px 44px rgba(180, 160, 200, 0.18);
            --radius-xl: 28px;
            --radius-lg: 22px;
            --radius-md: 16px;
            --radius-sm: 12px;
            --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
            --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: "Noto Sans SC", sans-serif;
            background: linear-gradient(175deg,
                    #FFF8F5 0%, #FEF5F8 8%, #F8F0FF 22%,
                    #F5F0FA 35%, #F0F5FB 50%, #F5F8F5 65%,
                    #FFFBF0 78%, #FFF8F5 100%);
            background-attachment: fixed;
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased;
            padding-bottom: 100px;
            position: relative;
        }

        /* ========== 背景装饰：浮动云朵 & 星光 ========== */
        .bg-decorations {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .cloud {
            position: absolute;
            background: rgba(255, 255, 255, 0.55);
            border-radius: 50%;
            filter: blur(30px);
            animation: cloudFloat linear infinite;
        }
        .cloud:nth-child(1) {
            width: 180px;
            height: 90px;
            top: 6%;
            left: -5%;
            animation-duration: 28s;
            opacity: 0.5;
        }
        .cloud:nth-child(2) {
            width: 140px;
            height: 70px;
            top: 18%;
            right: -8%;
            animation-duration: 34s;
            animation-delay: -12s;
            opacity: 0.45;
        }
        .cloud:nth-child(3) {
            width: 200px;
            height: 100px;
            top: 55%;
            left: 30%;
            animation-duration: 38s;
            animation-delay: -20s;
            opacity: 0.35;
        }
        .cloud:nth-child(4) {
            width: 120px;
            height: 60px;
            top: 72%;
            right: 15%;
            animation-duration: 30s;
            animation-delay: -6s;
            opacity: 0.4;
        }
        @keyframes cloudFloat {
            0% {
                transform: translateX(0) translateY(0);
            }
            25% {
                transform: translateX(40px) translateY(-18px);
            }
            50% {
                transform: translateX(10px) translateY(-6px);
            }
            75% {
                transform: translateX(-20px) translateY(-22px);
            }
            100% {
                transform: translateX(0) translateY(0);
            }
        }

        .sparkle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #FFD8A8;
            border-radius: 50%;
            animation: sparkleFloat 5s ease-in-out infinite;
            box-shadow: 0 0 8px 2px rgba(255, 216, 168, 0.6);
        }
        .sparkle:nth-child(5) {
            top: 12%;
            left: 18%;
            animation-delay: 0s;
            background: #FFE0C0;
            box-shadow: 0 0 10px 3px rgba(255, 224, 192, 0.7);
            width: 5px;
            height: 5px;
        }
        .sparkle:nth-child(6) {
            top: 25%;
            left: 75%;
            animation-delay: -1.8s;
            background: #FFD4B8;
            box-shadow: 0 0 7px 2px rgba(255, 212, 184, 0.55);
            width: 3px;
            height: 3px;
        }
        .sparkle:nth-child(7) {
            top: 48%;
            left: 8%;
            animation-delay: -3.2s;
            background: #FFECD0;
            box-shadow: 0 0 9px 3px rgba(255, 236, 208, 0.65);
        }
        .sparkle:nth-child(8) {
            top: 68%;
            left: 82%;
            animation-delay: -4.5s;
            background: #FFE8CC;
            box-shadow: 0 0 6px 2px rgba(255, 232, 204, 0.5);
            width: 3px;
            height: 3px;
        }
        @keyframes sparkleFloat {
            0%,
            100% {
                opacity: 0.3;
                transform: translateY(0) scale(1);
            }
            30% {
                opacity: 1;
                transform: translateY(-16px) scale(1.6);
            }
            60% {
                opacity: 0.45;
                transform: translateY(-6px) scale(0.8);
            }
        }

        /* ========== 顶部状态栏 ========== */
        .top-bar {
            position: sticky;
            top: 0;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(22px);
            -webkit-backdrop-filter: blur(22px);
            border-bottom: 1px solid rgba(200, 180, 220, 0.1);
            padding: 0 16px;
            height: 56px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .top-bar-brand {
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }
        .top-bar-logo {
            width: 34px;
            height: 34px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFE0E8, #FFB5C2);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1em;
            animation: logoBreathe 3s ease-in-out infinite;
            box-shadow: 0 3px 12px rgba(255, 181, 194, 0.35);
        }
        @keyframes logoBreathe {
            0%,
            100% {
                transform: scale(1);
                box-shadow: 0 3px 12px rgba(255, 181, 194, 0.35);
            }
            50% {
                transform: scale(1.08);
                box-shadow: 0 6px 20px rgba(255, 181, 194, 0.5);
            }
        }
        .top-bar-appname {
            font-family: "ZCOOL KuaiLe", sans-serif;
            font-size: 1.05em;
            font-weight: 700;
            background: linear-gradient(135deg, #E8788A, #B8A9D4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .top-bar-mine {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            border: none;
            background: rgba(200, 180, 220, 0.12);
            cursor: pointer;
            font-size: 1.3em;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.3s var(--transition-bounce);
            color: var(--text-primary);
            position: relative;
        }
        .top-bar-mine:active {
            transform: scale(0.88);
            background: rgba(200, 180, 220, 0.25);
        }
        .top-bar-mine:hover {
            background: rgba(200, 180, 220, 0.2);
        }

        /* ========== 侧边栏遮罩 & 面板 ========== */
        .sidebar-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.35);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.35s var(--transition-smooth);
        }
        .sidebar-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .sidebar-panel {
            position: fixed;
            top: 0;
            right: -320px;
            width: 300px;
            max-width: 82vw;
            height: 100%;
            background: rgba(255, 255, 255, 0.96);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            z-index: 2001;
            transition: right 0.4s var(--transition-smooth);
            padding: 24px 20px;
            display: flex;
            flex-direction: column;
            border-radius: var(--radius-xl) 0 0 var(--radius-xl);
            box-shadow: -8px 0 36px rgba(0, 0, 0, 0.1);
        }
        .sidebar-panel.active {
            right: 0;
        }
        .sidebar-close {
            align-self: flex-end;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: none;
            background: rgba(200, 180, 220, 0.15);
            cursor: pointer;
            font-size: 1.2em;
            transition: all 0.3s var(--transition-bounce);
            color: var(--text-primary);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .sidebar-close:active {
            transform: scale(0.85);
        }
        .sidebar-user-info {
            text-align: center;
            padding: 16px 0 24px;
        }
        .sidebar-avatar {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: linear-gradient(135deg, #FFE0E8, #FFB5C2, #E8E0F5);
            margin: 0 auto 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.2em;
            box-shadow: 0 6px 24px rgba(255, 181, 194, 0.3);
            animation: avatarBreathe 3.5s ease-in-out infinite;
        }
        @keyframes avatarBreathe {
            0%,
            100% {
                box-shadow: 0 6px 24px rgba(255, 181, 194, 0.3);
            }
            50% {
                box-shadow: 0 10px 32px rgba(255, 181, 194, 0.5);
            }
        }
        .sidebar-username {
            font-family: "ZCOOL KuaiLe", sans-serif;
            font-size: 1.2em;
            color: var(--text-primary);
        }
        .sidebar-links {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 13px 16px;
            border-radius: var(--radius-md);
            text-decoration: none;
            color: var(--text-primary);
            font-weight: 500;
            transition: all 0.3s var(--transition-smooth);
            font-size: 0.95em;
        }
        .sidebar-link:hover {
            background: rgba(255, 180, 190, 0.15);
        }
        .sidebar-link:active {
            transform: scale(0.96);
            background: rgba(255, 180, 190, 0.25);
        }

        /* ========== Toast提示 ========== */
        .toast-message {
            position: fixed;
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(80, 60, 90, 0.82);
            color: white;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 10000;
            pointer-events: none;
            white-space: nowrap;
            backdrop-filter: blur(10px);
            transition: opacity 0.3s;
            opacity: 0;
            letter-spacing: 0.03em;
        }
        .toast-message.show {
            opacity: 1;
        }

        /* ========== 主内容容器 ========== */
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 12px 18px 20px;
            position: relative;
            z-index: 1;
        }

        /* ========== 宝宝信息卡片 ========== */
        .baby-card {
            background: var(--card-bg);
            backdrop-filter: blur(14px);
            -webkit-backdrop-filter: blur(14px);
            border-radius: var(--radius-xl);
            padding: 22px 20px 18px;
            box-shadow: var(--shadow-lg);
            animation: cardFloat 5s ease-in-out infinite;
            position: relative;
            overflow: visible;
            transition: all 0.4s var(--transition-smooth);
        }
        @keyframes cardFloat {
            0%,
            100% {
                transform: translateY(0);
            }
            50% {
                transform: translateY(-7px);
            }
        }
        .baby-card-inner {
            display: flex;
            gap: 18px;
            align-items: stretch;
        }
        /* 左侧头像区 */
        .baby-avatar-wrap {
            flex-shrink: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            cursor: pointer;
            transition: transform 0.35s var(--transition-bounce);
            position: relative;
        }
        .baby-avatar-wrap:active {
            transform: scale(0.9);
        }
        .baby-avatar-ring {
            width: 88px;
            height: 88px;
            border-radius: 50%;
            padding: 5px;
            background: conic-gradient(from 0deg,
                    #FFB5C2, #FFE0E8, #E8E0F5, #B5D8F7,
                    #B5E8D5, #FFE8C0, #FFB5C2);
            animation: ringRotate 8s linear infinite, ringBreathe 3s ease-in-out infinite;
            box-shadow: 0 6px 22px rgba(200, 170, 200, 0.25);
        }
        @keyframes ringRotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }
        @keyframes ringBreathe {
            0%,
            100% {
                box-shadow: 0 6px 22px rgba(200, 170, 200, 0.25);
            }
            50% {
                box-shadow: 0 10px 32px rgba(200, 170, 200, 0.45);
            }
        }
        .baby-avatar-inner {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            background: linear-gradient(145deg, #FFF5F5, #FFE8EC, #F8F0FF);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8em;
            overflow: hidden;
            border: 3px solid rgba(255, 255, 255, 0.7);
        }
        .baby-avatar-inner img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
        }
        .baby-nickname {
            font-family: "ZCOOL KuaiLe", sans-serif;
            font-size: 1.15em;
            color: var(--text-primary);
            font-weight: 700;
            letter-spacing: 0.04em;
        }

        /* 右侧信息区 */
        .baby-info-right {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 8px;
            justify-content: center;
        }
        .baby-info-row {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            animation: fadeInUp 0.6s var(--transition-smooth) both;
        }
        .baby-info-row:nth-child(1) {
            animation-delay: 0.1s;
        }
        .baby-info-row:nth-child(2) {
            animation-delay: 0.25s;
        }
        @keyframes fadeInUp {
            from {
                opacity: 0;
                transform: translateY(14px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        .baby-info-label {
            font-size: 0.75em;
            color: var(--text-light);
            white-space: nowrap;
            font-weight: 500;
        }
        .baby-info-value {
            font-family: "ZCOOL KuaiLe", sans-serif;
            font-size: 1.25em;
            font-weight: 700;
            color: #E8788A;
            animation: numberPop 0.5s var(--transition-bounce) both;
            animation-delay: 0.4s;
        }
        .baby-info-value.countdown {
            color: #C08050;
            animation: countdownPulse 1.5s ease-in-out infinite;
            animation-delay: 0s;
        }
        @keyframes numberPop {
            0% {
                transform: scale(0.5);
                opacity: 0;
            }
            100% {
                transform: scale(1);
                opacity: 1;
            }
        }
        @keyframes countdownPulse {
            0%,
            100% {
                transform: scale(1);
            }
            50% {
                transform: scale(1.12);
            }
        }
        .baby-info-icon {
            font-size: 1.1em;
            display: inline-block;
        }

        /* 卡片底部横栏：身高体重 */
        .baby-stats-bar {
            display: flex;
            gap: 14px;
            margin-top: 14px;
            padding-top: 12px;
            border-top: 1px dashed rgba(200, 180, 220, 0.22);
            animation: statsSway 4s ease-in-out infinite;
        }
        @keyframes statsSway {
            0%,
            100% {
                transform: translateX(0);
            }
            25% {
                transform: translateX(3px);
            }
            75% {
                transform: translateX(-3px);
            }
        }
        .baby-stat-item {
            flex: 1;
            display: flex;
            align-items: center;
            gap: 6px;
            background: rgba(240, 235, 250, 0.4);
            border-radius: var(--radius-sm);
            padding: 10px 12px;
            transition: all 0.3s var(--transition-bounce);
            cursor: default;
        }
        .baby-stat-item:hover {
            background: rgba(240, 235, 250, 0.65);
            transform: translateY(-2px);
        }
        .baby-stat-icon {
            font-size: 1.5em;
            flex-shrink: 0;
        }
        .baby-stat-info {
            display: flex;
            flex-direction: column;
        }
        .baby-stat-label {
            font-size: 0.68em;
            color: var(--text-light);
            font-weight: 500;
        }
        .baby-stat-value {
            font-family: "ZCOOL KuaiLe", sans-serif;
            font-size: 1.15em;
            font-weight: 700;
            color: #5D8A6E;
        }

        /* ========== 快捷功能入口 ========== */
        .quick-actions {
            display: flex;
            gap: 16px;
            justify-content: center;
            margin: 20px 0;
            flex-wrap: wrap;
        }
        .quick-action-btn {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 6px;
            padding: 16px 20px;
            border-radius: var(--radius-lg);
            border: none;
            cursor: pointer;
            background: var(--card-bg);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            box-shadow: var(--shadow-sm);
            transition: all 0.35s var(--transition-bounce);
            text-decoration: none;
            color: var(--text-primary);
            min-width: 90px;
            position: relative;
        }
        .quick-action-btn:hover {
            transform: translateY(-5px);
            box-shadow: var(--shadow-md);
            background: rgba(255, 255, 255, 0.9);
        }
        .quick-action-btn:active {
            transform: scale(0.88);
            box-shadow: var(--shadow-sm);
        }
        .quick-action-icon {
            font-size: 2em;
            transition: transform 0.35s var(--transition-bounce);
            display: block;
        }
        .quick-action-btn:active .quick-action-icon {
            transform: scale(1.3);
        }
        .quick-action-label {
            font-family: "ZCOOL KuaiLe", sans-serif;
            font-size: 0.88em;
            font-weight: 600;
            color: var(--text-secondary);
            letter-spacing: 0.03em;
        }
        .quick-action-btn:nth-child(1) {
            background: linear-gradient(135deg, rgba(255, 224, 232, 0.5), rgba(255, 255, 255, 0.7));
        }
        .quick-action-btn:nth-child(2) {
            background: linear-gradient(135deg, rgba(224, 245, 235, 0.5), rgba(255, 255, 255, 0.7));
        }
        .quick-action-btn:nth-child(3) {
            background: linear-gradient(135deg, rgba(232, 224, 245, 0.5), rgba(255, 255, 255, 0.7));
        }

        /* ========== 最新成长记录区 ========== */
        .section-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin: 22px 0 14px;
            padding: 0 4px;
        }
        .section-header h2 {
            font-family: "ZCOOL KuaiLe", sans-serif;
            font-size: 1.3em;
            color: var(--text-primary);
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .record-grid {
            display: flex;
            flex-direction: column;
            gap: 14px;
        }
        .record-card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: var(--radius-lg);
            overflow: hidden;
            box-shadow: var(--shadow-sm);
            transition: all 0.35s var(--transition-smooth);
            animation: fadeInUp 0.55s var(--transition-smooth) both;
            position: relative;
        }
        .record-card:nth-child(1) {
            animation-delay: 0.05s;
        }
        .record-card:nth-child(2) {
            animation-delay: 0.15s;
        }
        .record-card:nth-child(3) {
            animation-delay: 0.25s;
        }
        .record-card:nth-child(4) {
            animation-delay: 0.35s;
        }
        .record-card:nth-child(5) {
            animation-delay: 0.45s;
        }
        .record-card:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-md);
        }
        .record-card:active {
            transform: scale(0.97);
        }
        .record-card img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            display: block;
        }
        .record-card .rc-body {
            padding: 14px 16px;
        }
        .record-card .rc-date {
            font-size: 0.74em;
            color: #B8A9D4;
            font-weight: 500;
            margin-bottom: 2px;
        }
        .record-card .rc-title {
            font-family: "ZCOOL KuaiLe", sans-serif;
            font-size: 1.05em;
            margin-bottom: 3px;
            color: var(--text-primary);
        }
        .record-card .rc-desc {
            font-size: 0.82em;
            color: var(--text-secondary);
            line-height: 1.45;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .record-card .rc-tag {
            display: inline-block;
            font-size: 0.7em;
            padding: 3px 10px;
            border-radius: 12px;
            font-weight: 600;
            margin-bottom: 6px;
            letter-spacing: 0.03em;
        }
        .tag-gallery {
            background: #FFE0E8;
            color: #E8788A;
        }

        /* ========== 底部导航栏 ========== */

            right: 0;

            flex-direction: column;

            gap: 2px;
            text-decoration: none;

            font-weight: 500;

            cursor: pointer;

            font-size: 1.55em;

        }
        .bottom-nav-item.active {

            font-weight: 700;
        }
        .bottom-nav-item.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            width: 22px;
            height: 3px;
            border-radius: 3px;
            background: #E8788A;
            animation: navIndicator 0.4s var(--transition-bounce);
        }
        @keyframes navIndicator {
            from {

            to {

        .bottom-nav-item:active {

        .bottom-nav-item:hover {

        }
        /* +号特殊按钮 */
        .bottom-nav-add {
            position: relative;
            top: -22px;
            width: 52px;
            height: 52px;

            background: linear-gradient(135deg, #FFB5C2, #FF9AB2);

        }
        @keyframes addBtnBreathe {
            0%,
            100% {
                box-shadow: 0 8px 26px rgba(255, 154, 178, 0.45);
            }
            50% {
                box-shadow: 0 14px 36px rgba(255, 154, 178, 0.65);

        }
        .bottom-nav-add:active {

            box-shadow: 0 4px 14px rgba(255, 154, 178, 0.5);
        }
        .bottom-nav-add:hover {
            transform: scale(1.08);
            box-shadow: 0 12px 32px rgba(255, 154, 178, 0.6);

        .bottom-nav-add-label {

        .add-overlay {

            left: 0;

</head>
<body>

        </div>

            <a sec:authorize="!isAuthenticated()" href="/login" class="sidebar-link">🔐 登录账号</a>

                        <span class="baby-stat-value" id="statHeight">

                            <span th:if="${latestWeight == null}">-- kg</span>
                        </span>
                    </div>

        <!-- 快捷功能入口 -->
        <div class="quick-actions">

            <a href="/growth" class="quick-action-btn">

<script th:inline="javascript">
    /*<![CDATA[*/
    // ========== 年龄与倒计时计算 ==========
    (function() {
        var birthday = new Date(2017, 1, 24); // 2017年2月24日（月份从0开始）
        var now = new Date();

        // 计算周岁和月龄
        var y = now.getFullYear() - birthday.getFullYear();
        var m = now.getMonth() - birthday.getMonth();
        var d = now.getDate() - birthday.getDate();
        if (d < 0) { m--;
            d += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
        if (m < 0) { y--;
            m += 12; }

        var ageEl = document.getElementById('ageNumber');
        if (ageEl) {
            ageEl.textContent = y + '岁' + m + '个月' + d + '天';
            // 数字弹跳动画
            ageEl.style.animation = 'none';
            ageEl.offsetHeight;
            ageEl.style.animation = 'numberPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both';
        }

        // 总天数
        var totalDays = Math.floor((now.getTime() - birthday.getTime()) / (1000 * 60 * 60 * 24));
        var totalDaysEl = document.getElementById('totalDays');
        if (totalDaysEl) {
            totalDaysEl.textContent = totalDays;
            totalDaysEl.style.animation = 'none';
            totalDaysEl.offsetHeight;
            totalDaysEl.style.animation = 'numberPop 0.5s cubic-bezier(0.34,1.56,0.64,1) both';
            totalDaysEl.style.animationDelay = '0.15s';
        }

        // 生日倒计时
        var nextBirthday = new Date(now.getFullYear(), 1, 24); // 2月24日
        if (now > nextBirthday) nextBirthday.setFullYear(nextBirthday.getFullYear() + 1);
        var countdown = Math.ceil((nextBirthday - now) / (1000 * 60 * 60 * 24));
        var countdownEl = document.getElementById('birthdayCountdown');
        if (countdownEl) {
            countdownEl.textContent = countdown;
        }
    })();

    // ========== 侧边栏切换 ==========
    function toggleSidebar() {
        var overlay = document.getElementById('sidebarOverlay');
        var panel = document.getElementById('sidebarPanel');
        var isActive = overlay.classList.contains('active');
        if (isActive) {
            overlay.classList.remove('active');
            panel.classList.remove('active');
            document.body.style.overflow = '';
        } else {
            overlay.classList.add('active');
            panel.classList.add('active');
            document.body.style.overflow = 'hidden';
        }
    }

    // 点击侧边栏链接后关闭侧边栏
    document.querySelectorAll('.sidebar-link').forEach(function(link) {
        link.addEventListener('click', function() {
            setTimeout(function() {
                var overlay = document.getElementById('sidebarOverlay');
                var panel = document.getElementById('sidebarPanel');
                overlay.classList.remove('active');
                panel.classList.remove('active');
                document.body.style.overflow = '';
            }, 200);
        });
    });

    // ========== 添加弹窗 ==========
    function openAddOverlay() {
        var overlay = document.getElementById('addOverlay');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeAddOverlay() {
        var overlay = document.getElementById('addOverlay');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
    }

    // 点击遮罩关闭
    document.getElementById('addOverlay').addEventListener('click', function(e) {
        if (e.target === this) {
            closeAddOverlay();
        }
    });

    // 点击添加选项后关闭弹窗
    document.querySelectorAll('.add-option').forEach(function(opt) {
        opt.addEventListener('click', function() {
            setTimeout(closeAddOverlay, 150);
        });
    });

    // ========== 滚动返回顶部按钮 ==========
    window.addEventListener('scroll', function() {
        var btn = document.getElementById('backToTop');
        if (btn) {
            btn.style.display = window.scrollY > 400 ? 'flex' : 'none';
            btn.style.alignItems = 'center';
            btn.style.justifyContent = 'center';
        }
    });

    // ========== 移动端二次确认退出 ==========
    var toastMsg = document.getElementById('toastMsg');
    var exitTimer = null;
    var isFirstBack = true;

    function showToast(text) {
        if (!toastMsg) return;
        toastMsg.textContent = text;
        toastMsg.classList.add('show');
        if (exitTimer) clearTimeout(exitTimer);
        exitTimer = setTimeout(function() { toastMsg.classList.remove('show'); }, 1500);
    }

    function hasOpenOverlay() {
        var addOverlay = document.getElementById('addOverlay');
        var sidebarOverlay = document.getElementById('sidebarOverlay');
        return (addOverlay && addOverlay.classList.contains('active')) ||
            (sidebarOverlay && sidebarOverlay.classList.contains('active'));
    }

    window.history.pushState({ page: "home" }, "", window.location.href);
    window.addEventListener('popstate', function(event) {
        if (hasOpenOverlay()) {
            // 关闭所有打开的覆盖层
            var addOverlay = document.getElementById('addOverlay');
            var sidebarOverlay = document.getElementById('sidebarOverlay');
            var sidebarPanel = document.getElementById('sidebarPanel');
            if (addOverlay) addOverlay.classList.remove('active');
            if (sidebarOverlay) sidebarOverlay.classList.remove('active');
            if (sidebarPanel) sidebarPanel.classList.remove('active');
            document.body.style.overflow = '';
            window.history.pushState({ page: "home" }, "", window.location.href);
            return;
        }

        if (isFirstBack) {
            showToast('再按一次返回退出');
            isFirstBack = false;
            window.history.pushState({ page: "home" }, "", window.location.href);
        } else {
            window.history.back();
        }
        setTimeout(function() {
            isFirstBack = true;
        }, 3000);
    });

    // ========== 底部导航高亮 ==========
    (function() {
        var currentPath = window.location.pathname;
        var navItems = document.querySelectorAll('.bottom-nav-item');
        navItems.forEach(function(item) {
            var href = item.getAttribute('href');
            if (href && currentPath === href) {
                item.classList.add('active');
            } else if (href && currentPath.startsWith(href) && href !== '/') {
                item.classList.add('active');
            }
        });
        // 首页特殊处理
        if (currentPath === '/' || currentPath === '') {
            navItems.forEach(function(item) {
                if (item.getAttribute('href') === '/') {
                    item.classList.add('active');
                }
            });
        }
    })();

    /*]]>*/
</script>
</body>
</html>
