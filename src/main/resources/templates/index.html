<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>赵高钏的成长记录手册</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌱</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #E8788A;
            --primary-light: #FFF0F3;
            --primary-dark: #D46072;
            --bg: #FEF7F0;
            --card-bg: #FFFFFF;
            --text: #5F4B6E;
            --text-secondary: #9B8DAB;
            --text-light: #C5B2D8;
            --border: #F2EBE5;
            --pink: #FFB7C5;
            --pink-light: #FFE5E9;
            --gold: #FFE0A3;
            --green: #C5E0B4;
            --blue: #B8D8F8;
            --shadow-sm: 0 2px 8px rgba(95, 75, 110, 0.06);
            --shadow-md: 0 8px 28px rgba(95, 75, 110, 0.10);
            --shadow-lg: 0 16px 40px rgba(95, 75, 110, 0.13);
            --shadow-xl: 0 20px 48px rgba(232, 120, 138, 0.22);
            --shadow-nav: 0 -8px 32px rgba(95, 75, 110, 0.10), 0 -2px 8px rgba(95, 75, 110, 0.04);
            --radius-sm: 14px;
            --radius: 20px;
            --radius-lg: 28px;
            --radius-xl: 36px;
            --radius-2xl: 48px;
            --radius-full: 999px;
            --safe-bottom: env(safe-area-inset-bottom, 16px);
            --sidebar-width: 300px;
            --nav-height: 72px;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; -webkit-overflow-scrolling: touch; }
        body {
            font-family: "Quicksand", "PingFang SC", "Noto Sans SC", "Microsoft YaHei", sans-serif;
            background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden;
            padding-bottom: calc(var(--nav-height) + 30px + var(--safe-bottom));
            -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent;
            -webkit-font-smoothing: antialiased; -moz-osx-font-smoothing: grayscale; position: relative;
        }
        body, div, p, span, h1, h2, h3, h4, a, button, .nav-tab, .timeline-item, .info-chip, .stat-badge, .metric-item {
            -webkit-user-select: none; user-select: none; -webkit-touch-callout: none;
        }
        input, textarea { -webkit-user-select: text; user-select: text; }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #F2EBE5; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #FFC0CB; border-radius: 10px; }

        /* 遮罩层 */
        .overlay { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(60,35,45,0.45); z-index:500; opacity:0; pointer-events:none; transition: opacity 0.35s cubic-bezier(0.4,0,0.2,1); -webkit-tap-highlight-color:transparent; }
        .overlay.active { opacity:1; pointer-events:auto; }

        /* 侧边栏 */
        .sidebar { position:fixed; top:0; right:0; width:var(--sidebar-width); max-width:85vw; height:100%; height:100dvh; background:#FFFCF9; z-index:600; transform:translateX(105%); transition: transform 0.4s cubic-bezier(0.22,0.61,0.36,1); box-shadow:-8px 0 40px rgba(0,0,0,0.15); display:flex; flex-direction:column; overflow-y:auto; border-radius:28px 0 0 28px; padding:0; }
        .sidebar.active { transform:translateX(0); }
        .sidebar-header { padding:28px 22px 20px; text-align:center; border-bottom:1px solid #F2EBE5; flex-shrink:0; }
        .sidebar-avatar { width:72px; height:72px; border-radius:50%; background:linear-gradient(135deg,#FFE0E8,#FFD1D8); display:flex; align-items:center; justify-content:center; font-size:2.2rem; margin:0 auto 12px; box-shadow:0 6px 20px rgba(232,120,138,0.2); border:3px solid #fff; }
        .sidebar-name { font-weight:700; font-size:1.1rem; color:var(--text); letter-spacing:0.02em; }
        .sidebar-role { font-size:0.78rem; color:var(--text-light); margin-top:2px; }
        .sidebar-baby-tag { display:inline-block; margin-top:8px; background:#FFF0F3; color:var(--primary); padding:4px 14px; border-radius:20px; font-size:0.75rem; font-weight:600; }
        .sidebar-menu { flex:1; padding:12px 0; }
        .sidebar-menu-item { display:flex; align-items:center; gap:14px; padding:15px 24px; cursor:pointer; transition:0.2s; border:none; background:none; width:100%; text-align:left; font-family:inherit; font-size:0.9rem; color:var(--text); font-weight:500; letter-spacing:0.02em; -webkit-tap-highlight-color:transparent; }
        .sidebar-menu-item:active { background:#FFF5F5; transform:scale(0.98); }
        .sidebar-menu-item .menu-icon { font-size:1.25rem; width:36px; height:36px; border-radius:50%; display:flex; align-items:center; justify-content:center; flex-shrink:0; background:#FFF8F6; transition:0.2s; }
        .sidebar-menu-item:active .menu-icon { background:#FFF0ED; }
        .sidebar-divider { height:1px; background:#F2EBE5; margin:6px 20px; }
        .sidebar-footer { padding:16px 24px 28px; border-top:1px solid #F2EBE5; flex-shrink:0; }
        .sidebar-logout { display:flex; align-items:center; gap:10px; padding:12px 18px; border-radius:var(--radius-full); cursor:pointer; border:1.5px solid #F2EBE5; background:#fff; font-family:inherit; font-size:0.85rem; color:#C5A0A8; font-weight:600; width:100%; justify-content:center; transition:0.2s; letter-spacing:0.02em; }
        .sidebar-logout:active { background:#FFF5F5; border-color:#FFD1D8; color:#D46072; }
        .sidebar-close-btn { position:absolute; top:14px; left:14px; width:34px; height:34px; border-radius:50%; background:#F5F0ED; border:none; cursor:pointer; font-size:1rem; display:flex; align-items:center; justify-content:center; color:var(--text-secondary); transition:0.2s; z-index:2; }
        .sidebar-close-btn:active { background:#EBE4DE; transform:scale(0.9); }

        /* 装饰云朵 */
        .deco-cloud { position:fixed; background:rgba(255,250,240,0.7); border-radius:200px; filter:blur(14px); z-index:0; pointer-events:none; }
        .cloud1 { width:180px; height:80px; top:10px; left:-40px; animation:cloudDrift1 18s ease-in-out infinite; }
        .cloud2 { width:240px; height:100px; bottom:18%; right:-60px; animation:cloudDrift2 22s ease-in-out infinite; }
        @keyframes cloudDrift1 { 0%,100%{ transform:translateX(0) translateY(0); } 25%{ transform:translateX(30px) translateY(-12px); } 50%{ transform:translateX(15px) translateY(-6px); } 75%{ transform:translateX(35px) translateY(-16px); } }
        @keyframes cloudDrift2 { 0%,100%{ transform:translateX(0) translateY(0); } 30%{ transform:translateX(-25px) translateY(10px); } 55%{ transform:translateX(-40px) translateY(5px); } 80%{ transform:translateX(-15px) translateY(14px); } }

        /* 顶部区域 */
        .status-bar { height:10px; background:transparent; }
        .top-bar { position:relative; z-index:10; display:flex; align-items:center; justify-content:space-between; padding:14px 20px 8px; background:transparent; }
        .logo-area { display:flex; align-items:center; gap:8px; font-family:"ZCOOL KuaiLe","Quicksand","PingFang SC",sans-serif; font-size:1.15rem; font-weight:600; color:var(--primary); letter-spacing:0.02em; }
        .logo-icon { width:32px; height:32px; background:#FFE0E8; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:0.95rem; color:#E8788A; box-shadow:0 2px 8px rgba(232,120,138,0.18); }
        .my-btn-top { display:flex; align-items:center; gap:6px; padding:8px 16px; border-radius:var(--radius-full); border:none; background:rgba(255,255,255,0.85); cursor:pointer; font-family:inherit; font-size:0.82rem; font-weight:600; color:var(--text); box-shadow:var(--shadow-sm); transition:0.2s; backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px); letter-spacing:0.02em; }
        .my-btn-top:active { transform:scale(0.92); box-shadow:var(--shadow-md); background:#fff; }
        .my-btn-top .my-avatar-mini { width:26px; height:26px; border-radius:50%; background:#FFE0E8; display:flex; align-items:center; justify-content:center; font-size:0.8rem; flex-shrink:0; }

        /* 宝宝信息卡片 */
        .profile-card { background:rgba(255,255,255,0.94); backdrop-filter:blur(16px); -webkit-backdrop-filter:blur(16px); border-radius:var(--radius-2xl); margin:8px 18px 22px; padding:26px 22px; box-shadow:var(--shadow-lg); position:relative; z-index:5; animation:cardFloat 3.5s infinite ease-in-out; border:1px solid rgba(255,255,255,0.6); overflow:hidden; }
        .profile-card::before { content:''; position:absolute; top:-40px; right:-30px; width:120px; height:120px; background:radial-gradient(circle, rgba(255,183,197,0.25) 0%, transparent 70%); border-radius:50%; pointer-events:none; }
        @keyframes cardFloat { 0%,100%{ transform:translateY(0px); } 50%{ transform:translateY(-5px); } }
        .card-inner { display:flex; flex-wrap:wrap; gap:22px; align-items:center; position:relative; z-index:1; }
        .avatar-side { flex-shrink:0; text-align:center; }
        .avatar-wrapper { position:relative; width:110px; height:110px; margin:0 auto; }
        .flower-ring { position:absolute; top:-10px; left:-10px; right:-10px; bottom:-10px; border-radius:50%; background:conic-gradient(#FFB7C5,#FFE0A3,#C5E0B4,#B8D8F8,#FFB7C5); animation:rotateRing 10s linear infinite; opacity:0.55; }
        @keyframes rotateRing { 0%{ transform:rotate(0deg); } 100%{ transform:rotate(360deg); } }
        .avatar-img { position:relative; width:110px; height:110px; background:#FFEDF2; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:3.2rem; cursor:pointer; transition:0.25s cubic-bezier(0.34,1.2,0.64,1); z-index:2; box-shadow:0 6px 18px rgba(232,120,138,0.18); border:3px solid #fff; }
        .avatar-img:active { transform:scale(0.94); }
        .baby-nickname { margin-top:10px; font-weight:700; font-size:1.05rem; color:var(--primary); letter-spacing:0.03em; }
        .info-side { flex:1; min-width:180px; display:flex; flex-direction:column; gap:10px; }
        .stats-row { display:flex; flex-wrap:wrap; gap:8px; align-items:center; justify-content:flex-start; }
        .info-chip { background:#F9F0F0; padding:7px 16px; border-radius:var(--radius-full); font-size:0.82rem; display:inline-flex; align-items:center; gap:5px; color:var(--text); font-weight:500; box-shadow:var(--shadow-sm); white-space:nowrap; flex-shrink:0; }
        .info-chip .value { font-weight:700; color:var(--primary); font-size:0.9rem; margin-left:2px; }
        .stat-badge { background:#FFF5F0; border-radius:var(--radius-full); padding:7px 16px; font-size:0.8rem; font-weight:500; color:var(--text-secondary); box-shadow:var(--shadow-sm); white-space:nowrap; display:inline-flex; align-items:center; gap:3px; flex-shrink:0; }
        .stat-number { font-weight:700; font-size:1rem; color:#FF9AB2; margin:0 2px; }
        .metric-bar { display:flex; gap:14px; flex-wrap:wrap; }
        .metric-item { display:flex; align-items:baseline; gap:6px; background:#FFF4F0; padding:8px 18px; border-radius:var(--radius-full); flex:1; min-width:100px; justify-content:center; box-shadow:var(--shadow-sm); border:1.5px solid transparent; }
        .metric-icon { font-size:1rem; }
        .metric-value { font-weight:700; font-size:1.15rem; color:var(--primary); transition:0.3s; }
        .edit-btn { background:none; border:none; color:#C5B2D8; font-size:0.85rem; cursor:pointer; transition:0.2s; padding:2px 6px; border-radius:10px; margin-left:2px; }
        .edit-btn:active { transform:scale(0.85); color:var(--primary); background:#FFF0F3; }

        /* 快捷操作区 */
        .quick-section { padding:0 18px 20px; position:relative; z-index:3; }
        .quick-section .section-label { font-family:"ZCOOL KuaiLe","Quicksand","PingFang SC",sans-serif; font-size:1.1rem; font-weight:600; color:var(--primary); margin-bottom:12px; padding:0 6px; letter-spacing:0.03em; }
        .quick-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; }
        .quick-chip { display:flex; flex-direction:column; align-items:center; gap:7px; padding:16px 10px; background:#fff; border-radius:var(--radius-lg); cursor:pointer; transition:0.2s cubic-bezier(0.34,1.2,0.64,1); box-shadow:var(--shadow-sm); border:none; font-family:inherit; color:var(--text); text-decoration:none; }
        .quick-chip:active { transform:scale(0.93); box-shadow:var(--shadow-md); background:#fdfaf8; }
        .quick-chip .q-icon { width:48px; height:48px; border-radius:50%; display:flex; align-items:center; justify-content:center; font-size:1.5rem; }
        .quick-chip .q-icon.pink { background:#FFF0F3; }
        .quick-chip .q-icon.gold { background:#FFF8EB; }
        .quick-chip .q-icon.purple { background:#F6F1FB; }
        .quick-chip .q-label { font-size:0.78rem; font-weight:600; color:var(--text-secondary); letter-spacing:0.02em; }

        /* 成长记录时间线 */
        .timeline-section { padding:0 18px 30px; position:relative; z-index:3; }
        .section-title { display:flex; align-items:baseline; justify-content:flex-start; margin-bottom:18px; padding:0 6px; }
        .section-title h2 { font-family:"ZCOOL KuaiLe","Quicksand","PingFang SC",sans-serif; font-size:1.35rem; font-weight:600; color:var(--primary); letter-spacing:0.03em; }
        .timeline-list { display:flex; flex-direction:column; gap:20px; }
        .timeline-item { background:white; border-radius:var(--radius-xl); overflow:hidden; box-shadow:var(--shadow-sm); transition: transform 0.25s ease-out, box-shadow 0.25s ease-out; opacity:0; transform:translateY(20px); animation:fadeSlide 0.5s forwards; cursor:pointer; border:1px solid rgba(0,0,0,0.03); }
        @keyframes fadeSlide { to { opacity:1; transform:translateY(0); } }
        .timeline-item:active { transform:translateY(-4px) !important; box-shadow:var(--shadow-xl) !important; }
        .timeline-item.long-press { transform:translateY(-6px) scale(1.015) !important; transition:transform 0.12s ease-out; box-shadow:var(--shadow-xl) !important; }
        .timeline-img { width:100%; height:200px; object-fit:cover; background:#F2EAE0; display:block; }
        .timeline-content { padding:16px 20px; }
        .timeline-category { display:inline-block; font-size:0.72rem; padding:4px 14px; border-radius:var(--radius-full); background:#FFE5E9; color:var(--primary); margin-bottom:8px; font-weight:600; letter-spacing:0.02em; }
        .timeline-title { font-weight:700; font-size:1rem; margin-bottom:5px; color:var(--text); letter-spacing:-0.01em; }
        .timeline-desc { font-size:0.82rem; color:var(--text-secondary); line-height:1.5; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
        .timeline-date { font-size:0.73rem; color:#C5B2D8; margin-top:10px; display:flex; align-items:center; gap:6px; font-weight:500; }
        .timeline-date::before { content:"✨"; font-size:0.65rem; }
        .empty-timeline { background:rgba(255,255,255,0.75); border-radius:var(--radius-2xl); padding:56px 20px; text-align:center; color:#B8A9D4; box-shadow:var(--shadow-sm); }
        .empty-timeline .empty-icon { font-size:3.5rem; margin-bottom:10px; animation:bounceIcon 2.5s ease-in-out infinite; }
        @keyframes bounceIcon { 0%,100%{ transform:translateY(0); } 30%{ transform:translateY(-14px); } 50%{ transform:translateY(0); } 70%{ transform:translateY(-7px); } }

        /* 底部导航栏 */
        .bottom-nav { position:fixed; bottom:0; left:0; width:100%; background:linear-gradient(180deg, rgba(255,255,255,0.88) 0%, rgba(255,252,249,0.95) 40%, rgba(255,250,247,0.97) 100%); backdrop-filter:blur(24px); -webkit-backdrop-filter:blur(24px); border-radius:24px 24px 0 0; display:flex; justify-content:center; align-items:flex-end; padding:6px 10px calc(8px + var(--safe-bottom)); z-index:100; box-shadow:var(--shadow-nav); border-top:1px solid rgba(255,220,210,0.5); }
        .bottom-nav::before { content:''; position:absolute; top:4px; left:50%; transform:translateX(-50%); width:60px; height:3px; background:#EBD5D5; border-radius:3px; opacity:0.5; pointer-events:none; }
        .nav-inner { display:flex; justify-content:space-around; align-items:flex-end; width:100%; max-width:500px; gap:0; }
        .nav-tab { display:flex; flex-direction:column; align-items:center; gap:3px; text-decoration:none; color:#B2A5C2; font-size:0.66rem; font-weight:600; transition:0.3s cubic-bezier(0.34,1.2,0.64,1); padding:8px 6px; border-radius:16px; position:relative; min-width:50px; letter-spacing:0.03em; background:none; border:none; cursor:pointer; font-family:inherit; flex:1 1 0%; max-width:72px; z-index:1; }
        .nav-tab .nav-icon { font-size:1.3rem; transition:0.3s cubic-bezier(0.34,1.2,0.64,1); display:block; line-height:1; position:relative; z-index:1; }
        .nav-tab .nav-label { font-size:0.62rem; font-weight:600; letter-spacing:0.04em; transition:0.3s; position:relative; z-index:1; }
        .nav-tab.active { color:var(--primary); }
        .nav-tab.active .nav-icon { transform:translateY(-2px); filter:drop-shadow(0 2px 4px rgba(232,120,138,0.3)); }
        .nav-tab:active { opacity:0.7; transform:scale(0.88); }
        .nav-dot { width:4px; height:4px; background:var(--primary); border-radius:50%; opacity:0; transition:0.3s cubic-bezier(0.34,1.2,0.64,1); position:relative; z-index:1; }
        .nav-tab.active .nav-dot { opacity:1; }
        .nav-tab.add-center { position:relative; top:-22px; padding:0; min-width:auto; flex:0 0 auto; max-width:none; z-index:10; align-self:center; }
        .nav-tab.add-center .add-circle { width:56px; height:56px; border-radius:50%; background:linear-gradient(155deg,#FFBBC8 0%,#FF8A9E 35%,#F5788D 100%); display:flex; align-items:center; justify-content:center; font-size:1.7rem; color:#fff; box-shadow:0 10px 30px rgba(255,120,145,0.5),0 0 0 5px rgba(255,255,255,0.55),0 0 0 10px rgba(255,180,190,0.18); transition:0.3s cubic-bezier(0.34,1.2,0.64,1); font-weight:300; line-height:1; position:relative; animation:addPulse 3s ease-in-out infinite; }
        .nav-tab.add-center .add-circle::after { content:''; position:absolute; top:8px; left:14px; width:16px; height:8px; background:rgba(255,255,255,0.45); border-radius:50%; transform:rotate(-20deg); pointer-events:none; }
        @keyframes addPulse { 0%,100%{ box-shadow:0 10px 30px rgba(255,120,145,0.5),0 0 0 5px rgba(255,255,255,0.55),0 0 0 10px rgba(255,180,190,0.18); } 50%{ box-shadow:0 14px 36px rgba(255,120,145,0.6),0 0 0 7px rgba(255,255,255,0.6),0 0 0 14px rgba(255,180,190,0.25); } }
        .nav-tab.add-center:active .add-circle { transform:scale(0.86); box-shadow:0 6px 18px rgba(255,120,145,0.4),0 0 0 3px rgba(255,255,255,0.5),0 0 0 8px rgba(255,180,190,0.15); animation:none; }
        .nav-tab.add-center .nav-dot { display:none; }

        /* Toast消息 */
        .toast-message { position:fixed; bottom:30%; left:50%; transform:translateX(-50%); background:rgba(60,40,55,0.82); color:white; padding:11px 22px; border-radius:var(--radius-full); font-size:0.88rem; z-index:10000; pointer-events:none; white-space:nowrap; backdrop-filter:blur(10px); -webkit-backdrop-filter:blur(10px); transition:opacity 0.35s cubic-bezier(0.4,0,0.2,1); opacity:0; font-weight:500; letter-spacing:0.03em; box-shadow:0 8px 24px rgba(0,0,0,0.2); }
        .toast-message.show { opacity:1; }

        /* 数字跳动 */
        .number-jump { animation:numPop 0.35s cubic-bezier(0.34,1.2,0.64,1); }
        @keyframes numPop { 0%{ transform:scale(1); } 40%{ transform:scale(1.25); color:#FF6B8A; } 100%{ transform:scale(1); } }

        /* 响应式 */
        @media (max-width:600px) {
            .profile-card { margin:6px 12px 18px; padding:18px 14px; border-radius:var(--radius-xl); }
            .avatar-wrapper { width:80px; height:80px; }
            .avatar-img { width:80px; height:80px; font-size:2.2rem; }
            .flower-ring { top:-8px; left:-8px; right:-8px; bottom:-8px; }
            .card-inner { flex-direction:column; text-align:center; gap:14px; }
            .info-side { width:100%; gap:8px; }
            .stats-row { justify-content:center; gap:6px; }
            .info-chip { padding:6px 11px; font-size:0.7rem; }
            .info-chip .value { font-size:0.78rem; }
            .stat-badge { padding:6px 11px; font-size:0.7rem; }
            .stat-number { font-size:0.88rem; }
            .metric-bar { justify-content:center; gap:8px; }
            .metric-item { padding:7px 14px; font-size:0.8rem; min-width:80px; flex:0 1 auto; }
            .metric-value { font-size:1rem; }
            .timeline-img { height:160px; }
            .quick-grid { grid-template-columns:repeat(3,1fr); gap:8px; }
            .quick-chip { padding:14px 8px; }
            .quick-chip .q-icon { width:40px; height:40px; font-size:1.2rem; }
            .quick-chip .q-label { font-size:0.7rem; }
            .bottom-nav { border-radius:20px 20px 0 0; padding:5px 6px calc(7px + var(--safe-bottom)); }
            .bottom-nav::before { width:44px; height:3px; top:3px; }
            .nav-tab { padding:6px 3px; min-width:36px; max-width:56px; font-size:0.58rem; gap:2px; }
            .nav-tab .nav-icon { font-size:1.15rem; }
            .nav-tab .nav-label { font-size:0.55rem; }
            .nav-tab.add-center { top:-18px; }
            .nav-tab.add-center .add-circle { width:48px; height:48px; font-size:1.4rem; }
            .my-btn-top { padding:6px 12px; font-size:0.72rem; gap:4px; }
            .my-btn-top .my-avatar-mini { width:22px; height:22px; font-size:0.65rem; }
            .sidebar { border-radius:22px 0 0 22px; }
        }
        @media (min-width:768px) {
            body { max-width:500px; margin:0 auto; box-shadow:0 0 60px rgba(0,0,0,0.08); min-height:100vh; border-left:1px solid #f0e8e0; border-right:1px solid #f0e8e0; }
            .bottom-nav { max-width:500px; left:50%; transform:translateX(-50%); }
            .nav-inner { max-width:460px; }
            .sidebar { max-width:320px; right:calc((100vw - 500px) / 2); }
            @media (max-width:820px) { .sidebar { right:0; } }
        }
    </style>
</head>
<body>
    <div class="deco-cloud cloud1"></div>
    <div class="deco-cloud cloud2"></div>
    <div class="overlay" id="overlay"></div>

    <!-- 侧边栏 -->
    <aside class="sidebar" id="sidebar">
        <button class="sidebar-close-btn" id="sidebarClose" aria-label="关闭侧边栏">✕</button>
        <div class="sidebar-header">
            <div class="sidebar-avatar">👨‍👩‍👧</div>
            <div class="sidebar-name">赵高钏的家长</div>
            <div class="sidebar-role">管理员账号</div>
            <span class="sidebar-baby-tag">👶 赵高钏</span>
        </div>
        <nav class="sidebar-menu">
            <button class="sidebar-menu-item" onclick="showToast('📝 编辑宝宝资料')"><span class="menu-icon">👶</span>宝宝资料</button>
            <button class="sidebar-menu-item" onclick="showToast('🔔 成长提醒设置')"><span class="menu-icon">🔔</span>提醒设置</button>
            <button class="sidebar-menu-item" onclick="showToast('📊 数据导出')"><span class="menu-icon">📤</span>数据导出</button>
            <div class="sidebar-divider"></div>
            <button class="sidebar-menu-item" onclick="showToast('⚙️ 应用设置')"><span class="menu-icon">⚙️</span>应用设置</button>
            <button class="sidebar-menu-item" onclick="showToast('❓ 帮助与反馈')"><span class="menu-icon">💬</span>帮助与反馈</button>
            <button class="sidebar-menu-item" onclick="showToast('ℹ️ 关于成长手册')"><span class="menu-icon">📖</span>关于</button>
        </nav>
        <div class="sidebar-footer">
            <a sec:authorize="!isAuthenticated()" href="/login" class="sidebar-logout" style="text-decoration:none;display:flex;">
                <span>🔐</span> 登录账号
            </a>
            <a sec:authorize="isAuthenticated()" href="/logout" class="sidebar-logout" style="text-decoration:none;display:flex;">
                <span>🚪</span> 退出登录
            </a>
        </div>
    </aside>

    <div class="status-bar"></div>
    <div class="top-bar">
        <div class="logo-area">
            <div class="logo-icon">🍼</div>
            <span>成长手册</span>
        </div>
        <button class="my-btn-top" id="myBtnTop" aria-label="我的">
            <span class="my-avatar-mini">👤</span>
            <span>我的</span>
        </button>
    </div>

    <!-- 宝宝信息卡片 -->
    <div class="profile-card">
        <div class="card-inner">
            <div class="avatar-side">
                <div class="avatar-wrapper">
                    <div class="flower-ring"></div>
                    <div class="avatar-img" onclick="showToast('📸 上传头像开发中~')">👶</div>
                </div>
                <div class="baby-nickname">赵高钏</div>
            </div>
            <div class="info-side">
                <!-- 第一排：出生日期 + 年龄 -->
                <div class="stats-row">
                    <div class="info-chip">🎂 出生 <span class="value">2017.02.24</span></div>
                    <div class="info-chip">✨ 年龄 <span class="value" id="ageValue">--</span></div>
                </div>
                <!-- 第二排：生长天数 + 生日倒计时 -->
                <div class="stats-row">
                    <div class="stat-badge">🌍 来到世界 <span class="stat-number" id="totalDays">--</span> 天</div>
                    <div class="stat-badge">🎂 倒计时 <span class="stat-number" id="countdownDays">--</span> 天</div>
                </div>
                <!-- 第三排：身高体重（从growth记录中提取） -->
                <div class="metric-bar">
                    <div class="metric-item">
                        <span class="metric-icon">📏</span>
                        <span class="metric-value" id="heightDisplay">--</span><span>cm</span>
                        <button class="edit-btn" onclick="editMetric('height')" aria-label="编辑身高">✎</button>
                    </div>
                    <div class="metric-item">
                        <span class="metric-icon">⚖️</span>
                        <span class="metric-value" id="weightDisplay">--</span><span>kg</span>
                        <button class="edit-btn" onclick="editMetric('weight')" aria-label="编辑体重">✎</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- 快捷操作区：仅相册、数据、留言 -->
    <div class="quick-section">
        <div class="section-label">⚡ 快速记录</div>
        <div class="quick-grid">
            <a href="/gallery" class="quick-chip">
                <span class="q-icon pink">🖼️</span>
                <span class="q-label">相册</span>
            </a>
            <a href="/growth" class="quick-chip">
                <span class="q-icon gold">📊</span>
                <span class="q-label">数据</span>
            </a>
            <a href="/messages" class="quick-chip">
                <span class="q-icon purple">💭</span>
                <span class="q-label">留言</span>
            </a>
        </div>
    </div>

    <!-- 最新成长记录（Thymeleaf动态渲染） -->
    <div class="timeline-section">
        <div class="section-title">
            <h2>✨ 最新成长记录</h2>
        </div>
        <div class="timeline-list" id="timelineList">
            <th:block th:if="${#lists.isEmpty(records)}">
                <div class="empty-timeline">
                    <div class="empty-icon">🧸</div>
                    <p>还没有成长记录，去拍照或写日记吧~</p>
                </div>
            </th:block>
            <th:block th:unless="${#lists.isEmpty(records)}">
                <div th:each="record, iterStat : ${records}"
                class="timeline-item"
                th:data-id="${record.id}"
                th:style="'animation-delay:' + (iterStat.index * 0.05) + 's'"
                th:onclick="'showToast(\'📋 查看记录详情\')'">
                <img th:if="${record.photoPath != null}"
                th:src="@{${record.photoPath}}"
                class="timeline-img"
                onerror="this.style.display='none'"
                alt="记录照片">
                <div class="timeline-content">
                    <span class="timeline-category"
                    th:text="${record.category == 'gallery' ? '📷 相册' : (record.category == 'growth' ? '📊 数据' : (record.category == 'diary' ? '📝 日记' : '💬 留言'))}">
                </span>
                <div class="timeline-title" th:text="${record.title}"></div>
                <div class="timeline-desc" th:text="${record.description}"></div>
                <div class="timeline-date" th:text="${#temporals.format(record.recordDate, 'yyyy年MM月dd日')}"></div>
            </div>
        </div>
    </th:block>
</div>
</div>

<!-- 底部导航栏 -->
<div class="bottom-nav">
    <div class="nav-inner">
        <a href="/" class="nav-tab active">
            <span class="nav-icon">🏠</span>
            <span class="nav-label">首页</span>
            <div class="nav-dot"></div>
        </a>
        <a href="/gallery" class="nav-tab">
            <span class="nav-icon">🖼️</span>
            <span class="nav-label">相册</span>
            <div class="nav-dot"></div>
        </a>
        <button class="nav-tab add-center" onclick="window.location.href='/gallery'" aria-label="快速记录">
            <span class="add-circle">＋</span>
        </button>
        <a href="/growth" class="nav-tab">
            <span class="nav-icon">📊</span>
            <span class="nav-label">数据</span>
            <div class="nav-dot"></div>
        </a>
        <a href="/messages" class="nav-tab">
            <span class="nav-icon">💭</span>
            <span class="nav-label">留言</span>
            <div class="nav-dot"></div>
        </a>
    </div>
</div>

<div class="toast-message" id="toastMsg"></div>

<script th:inline="javascript">
    /*<![CDATA[*/
    // ========== 年龄与倒计时计算（纯前端，不依赖后端数据） ==========
    const birthday = new Date(2017, 1, 24);

    function updateStats() {
        const now = new Date();
        let years = now.getFullYear() - birthday.getFullYear();
        let months = now.getMonth() - birthday.getMonth();
        let days = now.getDate() - birthday.getDate();
        if (days < 0) {
            months--;
            days += new Date(now.getFullYear(), now.getMonth(), 0).getDate();
        }
        if (months < 0) {
            years--;
            months += 12;
        }
        document.getElementById('ageValue').innerText = `${years}岁${months}个月${days}天`;

        const birthdayUTC = Date.UTC(2017, 1, 24);
        const todayUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
        const total = Math.floor((todayUTC - birthdayUTC) / (1000 * 60 * 60 * 24));
        document.getElementById('totalDays').innerText = total;

        let nextBday = new Date(now.getFullYear(), 1, 24);
        if (now > nextBday) nextBday.setFullYear(nextBday.getFullYear() + 1);
        const countdown = Math.ceil((nextBday - now) / (1000 * 60 * 60 * 24));
        document.getElementById('countdownDays').innerText = countdown;
    }
    updateStats();
    setInterval(updateStats, 60000);

    // ========== 从后端记录中提取身高体重 ==========
    const rawRecords = /*[[${records}]]*/ [];
    let latestHeight = null,
        latestWeight = null;
    if (rawRecords && rawRecords.length) {
        const growthRecords = rawRecords.filter(r => r.category === 'growth' && (r.heightCm != null || r.weightKg !=
            null));
        if (growthRecords.length > 0) {
            growthRecords.sort((a, b) => (b.recordDate || '').localeCompare(a.recordDate || ''));
            const latest = growthRecords[0];
            if (latest.heightCm) latestHeight = latest.heightCm;
            if (latest.weightKg) latestWeight = latest.weightKg;
        }
    }
    const heightSpan = document.getElementById('heightDisplay');
    const weightSpan = document.getElementById('weightDisplay');
    if (latestHeight !== null) heightSpan.innerText = latestHeight;
    if (latestWeight !== null) weightSpan.innerText = latestWeight;

    // ========== 编辑身高体重 ==========
    window.editMetric = function(type) {
        let currentVal = type === 'height' ? heightSpan.innerText : weightSpan.innerText;
        let label = type === 'height' ? '身高(cm)' : '体重(kg)';
        let newVal = prompt(`请输入新的${label}`, currentVal);
        if (newVal && !isNaN(parseFloat(newVal))) {
            const num = parseFloat(newVal).toFixed(1);
            if (type === 'height') {
                heightSpan.innerText = num;
                heightSpan.classList.add('number-jump');
                setTimeout(() => heightSpan.classList.remove('number-jump'), 350);
            } else {
                weightSpan.innerText = num;
                weightSpan.classList.add('number-jump');
                setTimeout(() => weightSpan.classList.remove('number-jump'), 350);
            }
            showToast(`✅ ${label}已更新为 ${num}`);
        }
    };

    // ========== Toast消息 ==========
    const toastMsg = document.getElementById('toastMsg');
    let exitTimer = null;
    window.showToast = function(text) {
        toastMsg.textContent = text;
        toastMsg.classList.add('show');
        if (exitTimer) clearTimeout(exitTimer);
        exitTimer = setTimeout(() => toastMsg.classList.remove('show'), 1800);
    };

    // ========== 返回退出逻辑 ==========
    let isFirstBack = true;
    window.history.pushState({ page: "home" }, "", window.location.href);
    window.addEventListener('popstate', function() {
        const sidebarActive = document.getElementById('sidebar').classList.contains('active');
        if (sidebarActive) {
            closeSidebar();
            window.history.pushState({ page: "home" }, "", window.location.href);
            return;
        }
        if (isFirstBack) {
            showToast('再按一次返回退出');
            isFirstBack = false;
            window.history.pushState({ page: "home" }, "", window.location.href);
        } else {
            window.history.back();
        }
        setTimeout(() => { isFirstBack = true; }, 3000);
    });

    // ========== 侧边栏逻辑 ==========
    const sidebar = document.getElementById('sidebar');
    const overlay = document.getElementById('overlay');
    const myBtnTop = document.getElementById('myBtnTop');
    const sidebarClose = document.getElementById('sidebarClose');

    function openSidebar() {
        sidebar.classList.add('active');
        overlay.classList.add('active');
        document.body.style.overflow = 'hidden';
    }

    function closeSidebar() {
        sidebar.classList.remove('active');
        overlay.classList.remove('active');
        document.body.style.overflow = '';
    }
    myBtnTop.addEventListener('click', openSidebar);
    sidebarClose.addEventListener('click', closeSidebar);
    overlay.addEventListener('click', closeSidebar);
    document.querySelectorAll('.sidebar-menu-item, .sidebar-logout').forEach(item => {
        item.addEventListener('click', () => setTimeout(closeSidebar, 300));
    });
    document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && sidebar.classList.contains('active')) closeSidebar();
    });
    let touchStartX = 0;
    sidebar.addEventListener('touchstart', (e) => { touchStartX = e.touches[0].clientX; }, { passive: true });
    sidebar.addEventListener('touchmove', (e) => {
        if (e.touches[0].clientX - touchStartX > 40) closeSidebar();
    }, { passive: true });

    // ========== 底部导航激活状态 ==========
    const currentPath = window.location.pathname;
    document.querySelectorAll('.nav-tab:not(.add-center)').forEach(tab => {
        const href = tab.getAttribute('href');
        if (href === currentPath || (currentPath === '/' && href === '/')) {
            tab.classList.add('active');
        } else {
            tab.classList.remove('active');
        }
    });

    // ========== 时间线交互效果 ==========
    function attachTimelineEvents() {
        const items = document.querySelectorAll('.timeline-item');
        let pressTimer;
        items.forEach(item => {
            const startPress = () => { pressTimer = setTimeout(() => item.classList.add('long-press'),
                300); };
            const endPress = () => { clearTimeout(pressTimer);
                item.classList.remove('long-press'); };
            item.addEventListener('touchstart', startPress, { passive: true });
            item.addEventListener('touchend', endPress);
            item.addEventListener('touchmove', endPress, { passive: true });
            item.addEventListener('mousedown', startPress);
            item.addEventListener('mouseup', endPress);
            item.addEventListener('mouseleave', endPress);
        });

        function handleScroll() {
            items.forEach((item, idx) => {
                const rect = item.getBoundingClientRect();
                const offset = (rect.top - window.innerHeight / 2) / 30;
                let translateX = Math.min(Math.max(offset, -6), 6);
                item.style.transform = idx % 2 === 0 ? `translateX(${translateX}px)` :
                    `translateX(${-translateX}px)`;
            });
        }
        window.addEventListener('scroll', handleScroll, { passive: true });
        handleScroll();
    }
    window.addEventListener('load', attachTimelineEvents);

    // ========== 全局按压反馈 ==========
    const pressableElements = document.querySelectorAll(
        '.avatar-img, .edit-btn, .quick-chip, .my-btn-top, .nav-tab:not(.add-center)');
    pressableElements.forEach(el => {
        el.addEventListener('touchstart', function() { this.style.transform = 'scale(0.94)'; }, { passive: true });
        el.addEventListener('touchend', function() { this.style.transform = ''; });
        el.addEventListener('mousedown', function() { this.style.transform = 'scale(0.94)'; });
        el.addEventListener('mouseup', function() { this.style.transform = ''; });
        el.addEventListener('mouseleave', function() { this.style.transform = ''; });
    });

    console.log('🌱 赵高钏的成长记录手册已就绪！');
    console.log('📊 身高体重从growth记录中自动提取');
    console.log('📋 成长记录由Thymeleaf动态渲染');
    console.log('👤 点击右上角"我的"打开侧边栏');
    /*]]>*/
</script>
</body>
</html>
