<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>赵高钏的成长记录手册</title>
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌱</text></svg>">
    <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600;700&family=ZCOOL+KuaiLe&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "Quicksand", "Noto Sans SC", sans-serif;
            background: #FEF7F0;
            color: #6A5A7A;
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
            -webkit-user-select: none;
            user-select: none;
        }
        /* 禁止复制 */
        body, div, p, span, h1, h2, h3, h4, a, button, .nav-tab, .timeline-item, .info-chip, .stat-badge, .metric-item, .quick-icon {
            -webkit-user-select: none;
            user-select: none;
            -webkit-touch-callout: none;
        }
        input, textarea {
            -webkit-user-select: text;
            user-select: text;
        }
        ::-webkit-scrollbar { width: 4px; height: 4px; }
        ::-webkit-scrollbar-track { background: #F2EBE5; border-radius: 10px; }
        ::-webkit-scrollbar-thumb { background: #FFC0CB; border-radius: 10px; }

        /* 装饰云朵/星光 */
        .deco-cloud {
            position: absolute;
            background: rgba(255,250,240,0.8);
            border-radius: 200px;
            filter: blur(10px);
            z-index: 0;
            pointer-events: none;
        }
        .cloud1 { width: 180px; height: 80px; top: 10px; left: -40px; }
        .cloud2 { width: 240px; height: 100px; bottom: 15%; right: -60px; }
        .deco-star {
            position: absolute;
            font-size: 1rem;
            color: #FFD966;
            opacity: 0.4;
            pointer-events: none;
            animation: floatStar 6s infinite;
        }
        @keyframes floatStar {
            0% { transform: translateY(0px) rotate(0deg); opacity: 0.2; }
            50% { transform: translateY(-12px) rotate(10deg); opacity: 0.6; }
            100% { transform: translateY(0px) rotate(0deg); opacity: 0.2; }
        }
        .star1 { top: 15%; left: 3%; animation-duration: 8s; }
        .star2 { bottom: 20%; right: 5%; animation-duration: 11s; }
        .star3 { top: 40%; right: 12%; animation-duration: 9s; }

        /* 顶部通栏 */
        .top-bar {
            position: relative;
            z-index: 20;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 20px;
            background: transparent;
        }
        .logo-area {
            display: flex;
            align-items: center;
            gap: 8px;
            font-family: "ZCOOL KuaiLe", "Quicksand", sans-serif;
            font-size: 1.2rem;
            font-weight: 600;
            color: #E8899B;
        }
        .logo-icon {
            width: 32px;
            height: 32px;
            background: #FFE0E8;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
            color: #E8788A;
        }
        .my-btn {
            background: rgba(255,245,240,0.8);
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            color: #E8788A;
            display: flex;
            align-items: center;
            gap: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .my-btn:active { transform: scale(0.94); background: rgba(255,230,220,0.9); }
        /* 侧边栏（简单实现，点击显示） */
        .sidebar {
            position: fixed;
            top: 0;
            right: -280px;
            width: 260px;
            height: 100%;
            background: rgba(255,255,255,0.98);
            backdrop-filter: blur(20px);
            box-shadow: -4px 0 20px rgba(0,0,0,0.05);
            z-index: 1000;
            transition: right 0.3s cubic-bezier(0.2,0.9,0.4,1.1);
            padding: 70px 20px 20px;
            border-radius: 32px 0 0 32px;
        }
        .sidebar.open { right: 0; }
        .sidebar-close {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 1.2rem;
            cursor: pointer;
            color: #E8788A;
        }
        .sidebar .user-info {
            text-align: center;
            margin-top: 20px;
        }
        .sidebar .avatar-large {
            width: 80px;
            height: 80px;
            background: #FFEDF2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.5rem;
            margin: 0 auto;
        }
        .sidebar .username {
            font-weight: 600;
            margin-top: 12px;
        }

        /* 宝宝信息卡片 */
        .profile-card {
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(12px);
            border-radius: 48px;
            margin: 12px 20px 24px;
            padding: 24px 20px;
            box-shadow: 0 20px 35px rgba(0,0,0,0.06);
            animation: cardFloat 3s infinite ease-in-out;
        }
        @keyframes cardFloat {
            0% { transform: translateY(0px); }
            50% { transform: translateY(-5px); }
            100% { transform: translateY(0px); }
        }
        .card-flex {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            align-items: center;
        }
        .avatar-area {
            flex-shrink: 0;
            text-align: center;
        }
        .avatar-wrapper {
            position: relative;
            width: 100px;
            height: 100px;
            margin: 0 auto;
        }
        .flower-ring {
            position: absolute;
            top: -8px;
            left: -8px;
            right: -8px;
            bottom: -8px;
            border-radius: 50%;
            background: conic-gradient(#FFB7C5, #FFE0A3, #C5E0B4, #B8D8F8, #FFB7C5);
            animation: rotateRing 8s linear infinite;
            opacity: 0.6;
        }
        @keyframes rotateRing {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .avatar-img {
            position: relative;
            width: 100px;
            height: 100px;
            background: #FFEDF2;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2.8rem;
            cursor: pointer;
            transition: transform 0.2s;
            z-index: 2;
            box-shadow: 0 6px 12px rgba(0,0,0,0.05);
        }
        .avatar-img:active { transform: scale(0.96); }
        .baby-nickname {
            margin-top: 8px;
            font-weight: 600;
            font-size: 0.9rem;
            color: #E8788A;
        }
        .info-area {
            flex: 1;
        }
        .row-info {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-bottom: 14px;
        }
        .chip {
            background: #F9F0F0;
            padding: 6px 18px;
            border-radius: 40px;
            font-size: 0.85rem;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }
        .chip .value {
            font-weight: 700;
            color: #E8788A;
        }
        .stat-row {
            display: flex;
            gap: 16px;
            margin-bottom: 14px;
        }
        .stat-item {
            background: #FFF5F0;
            border-radius: 40px;
            padding: 6px 16px;
            font-size: 0.8rem;
        }
        .stat-number {
            font-weight: 700;
            font-size: 1rem;
            color: #FF9AB2;
        }
        .metric-row {
            display: flex;
            gap: 20px;
            margin-top: 6px;
        }
        .metric-item {
            background: #FFF4F0;
            padding: 6px 18px;
            border-radius: 50px;
            display: inline-flex;
            align-items: baseline;
            gap: 8px;
            font-size: 0.9rem;
        }
        .metric-value {
            font-weight: 700;
            color: #E8788A;
        }
        .edit-icon {
            background: none;
            border: none;
            color: #C5B2D8;
            cursor: pointer;
            font-size: 0.8rem;
        }
        /* 手机端垂直布局 */
        @media (max-width: 600px) {
            .card-flex {
                flex-direction: column;
                text-align: center;
            }
            .row-info, .stat-row, .metric-row {
                justify-content: center;
            }
        }

        /* 快捷功能入口 */
        .quick-bar {
            display: flex;
            justify-content: space-around;
            gap: 16px;
            margin: 20px 20px 24px;
        }
        .quick-icon {
            flex: 1;
            background: white;
            border-radius: 32px;
            padding: 12px 8px;
            text-align: center;
            box-shadow: 0 8px 16px rgba(0,0,0,0.03);
            transition: all 0.2s;
            cursor: pointer;
            text-decoration: none;
            color: #6A5A7A;
        }
        .quick-icon:active { transform: scale(0.96); }
        .quick-icon .icon {
            font-size: 1.8rem;
            display: block;
            margin-bottom: 6px;
        }
        .quick-icon .label {
            font-size: 0.7rem;
            font-weight: 500;
        }

        /* 最新成长记录 */
        .timeline-section {
            padding: 0 20px 20px;
        }
        .section-title {
            display: flex;
            align-items: baseline;
            justify-content: space-between;
            margin-bottom: 16px;
            padding: 0 6px;
        }
        .section-title h2 {
            font-family: "ZCOOL KuaiLe", "Quicksand", sans-serif;
            font-size: 1.3rem;
            font-weight: 600;
            color: #E8788A;
        }
        .timeline-list {
            display: flex;
            flex-direction: column;
            gap: 18px;
        }
        .timeline-item {
            background: white;
            border-radius: 32px;
            overflow: hidden;
            box-shadow: 0 8px 20px rgba(0,0,0,0.04);
            transition: all 0.3s;
            animation: fadeSlide 0.4s forwards;
            opacity: 0;
            transform: translateY(15px);
        }
        @keyframes fadeSlide {
            to { opacity: 1; transform: translateY(0); }
        }
        .timeline-item:hover { transform: translateY(-4px); }
        .timeline-img {
            width: 100%;
            height: 180px;
            object-fit: cover;
            background: #F2EAE0;
        }
        .timeline-content {
            padding: 16px 20px;
        }
        .timeline-category {
            display: inline-block;
            font-size: 0.7rem;
            padding: 4px 12px;
            border-radius: 30px;
            background: #FFE5E9;
            color: #E8788A;
            margin-bottom: 8px;
        }
        .timeline-title {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 4px;
        }
        .timeline-desc {
            font-size: 0.8rem;
            color: #9B8DAB;
            line-height: 1.4;
        }
        .timeline-date {
            font-size: 0.7rem;
            color: #C5B2D8;
            margin-top: 8px;
        }
        .empty-timeline {
            background: rgba(255,255,255,0.7);
            border-radius: 48px;
            padding: 40px;
            text-align: center;
        }

        /* 底部导航栏 */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: rgba(255,255,255,0.96);
            backdrop-filter: blur(20px);
            border-radius: 32px 32px 0 0;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 10px 16px 18px;
            z-index: 100;
            box-shadow: 0 -4px 20px rgba(0,0,0,0.04);
        }
        .nav-tab {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            text-decoration: none;
            color: #B2A5C2;
            font-size: 0.7rem;
            transition: all 0.2s;
            padding: 4px 0;
        }
        .nav-tab span:first-child {
            font-size: 1.3rem;
            transition: transform 0.2s;
        }
        .nav-tab.active {
            color: #E8788A;
        }
        .nav-tab.active span:first-child {
            transform: translateY(-3px);
        }
        .nav-tab:active { opacity: 0.7; }
        .nav-dot {
            width: 4px;
            height: 4px;
            background: #E8788A;
            border-radius: 50%;
            margin-top: 4px;
            opacity: 0;
            transition: 0.2s;
        }
        .nav-tab.active .nav-dot { opacity: 1; }
        /* 中间 + 特殊样式 */
        .nav-tab.plus-btn span:first-child {
            font-size: 1.6rem;
            font-weight: 400;
        }

        /* 数字跳动动画 */
        .number-jump {
            animation: numPop 0.3s ease-out;
        }
        @keyframes numPop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); color: #FF6B8A; }
            100% { transform: scale(1); }
        }

        .toast-message {
            position: fixed;
            bottom: 30%;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 10px 20px;
            border-radius: 40px;
            font-size: 0.9rem;
            z-index: 10000;
            pointer-events: none;
            white-space: nowrap;
            backdrop-filter: blur(8px);
            transition: opacity 0.3s;
            opacity: 0;
        }
        .toast-message.show { opacity: 1; }
    </style>
</head>
<body>
<div class="deco-cloud cloud1"></div>
<div class="deco-cloud cloud2"></div>
<div class="deco-star star1">✦</div>
<div class="deco-star star2">⭐</div>
<div class="deco-star star3">✧</div>

<!-- 顶部通栏 -->
<div class="top-bar">
    <div class="logo-area">
        <div class="logo-icon">🍼</div>
        <span>成长手册</span>
    </div>
    <div class="my-btn" id="myBtn">👤 我的</div>
</div>

<!-- 侧边栏 -->
<div class="sidebar" id="sidebar">
    <div class="sidebar-close" id="closeSidebar">✕</div>
    <div class="user-info">
        <div class="avatar-large">👶</div>
        <div class="username">赵高钏</div>
        <div style="font-size:0.75rem; color:#B8A9D4;">成长记录册</div>
        <div style="margin-top:20px;">
            <a sec:authorize="!isAuthenticated()" href="/login" class="nav-link" style="display:block; margin:10px 0;">登录</a>
            <a sec:authorize="isAuthenticated()" href="/logout" class="nav-link" style="display:block;">退出</a>
        </div>
    </div>
</div>

<!-- 宝宝信息卡片 -->
<div class="profile-card">
    <div class="card-flex">
        <div class="avatar-area">
            <div class="avatar-wrapper">
                <div class="flower-ring"></div>
                <div class="avatar-img" id="avatarBtn" onclick="alert('上传头像开发中')">👶</div>
            </div>
            <div class="baby-nickname">赵高钏</div>
        </div>
        <div class="info-area">
            <div class="row-info">
                <div class="chip">🎂 出生 <span class="value">2017.02.24</span></div>
                <div class="chip">✨ 年龄 <span class="value" id="ageValue">--</span></div>
            </div>
            <div class="stat-row">
                <div class="stat-item">🌍 来到世界 <span class="stat-number" id="totalDays">--</span> 天</div>
                <div class="stat-item">🎂 生日倒计时 <span class="stat-number" id="countdownDays">--</span> 天</div>
            </div>
            <div class="metric-row">
                <div class="metric-item">
                    📏 身高 <span class="metric-value" id="heightDisplay">--</span> cm
                    <button class="edit-icon" onclick="editMetric('height')">✎</button>
                </div>
                <div class="metric-item">
                    ⚖️ 体重 <span class="metric-value" id="weightDisplay">--</span> kg
                    <button class="edit-icon" onclick="editMetric('weight')">✎</button>
                </div>
            </div>
        </div>
    </div>
</div>

<!-- 快捷功能区 -->
<div class="quick-bar">
    <a href="/gallery?featured=true" class="quick-icon" onclick="alert('精选相册开发中')">
        <div class="icon">⭐</div>
        <div class="label">精选相册</div>
    </a>
    <a href="/growth" class="quick-icon">
        <div class="icon">📊</div>
        <div class="label">成长记录</div>
    </a>
    <a href="/messages" class="quick-icon">
        <div class="icon">💬</div>
        <div class="label">家人留言</div>
    </a>
</div>

<!-- 最新成长记录 -->
<div class="timeline-section">
    <div class="section-title">
        <h2>🌟 最新成长记录 🌟</h2>
    </div>
    <div class="timeline-list">
        <div th:if="${#lists.isEmpty(records)}" class="empty-timeline">
            <div style="font-size: 2.5rem;">📸</div>
            <p>还没有记录，去添加吧~</p>
        </div>
        <div th:each="record, iterStat : ${records}" class="timeline-item" th:style="'animation-delay:' + (iterStat.index * 0.05) + 's'">
            <img th:if="${record.photoPath != null}" th:src="@{${record.photoPath}}" class="timeline-img" onerror="this.style.display='none'">
            <div class="timeline-content">
                <span class="timeline-category" th:text="${record.category == 'gallery' ? '📷 相册' : (record.category == 'growth' ? '📊 数据' : (record.category == 'diary' ? '📝 日记' : '💬 留言'))}"></span>
                <div class="timeline-title" th:text="${record.title}"></div>
                <div class="timeline-desc" th:text="${record.description}"></div>
                <div class="timeline-date" th:text="${#temporals.format(record.recordDate, 'yyyy年MM月dd日')}"></div>
            </div>
        </div>
    </div>
</div>

<!-- 底部导航栏 -->
<div class="bottom-nav">
    <a href="/" class="nav-tab active"><span>🏠</span><span>首页</span><div class="nav-dot"></div></a>
    <a href="/gallery" class="nav-tab"><span>🖼️</span><span>相册</span><div class="nav-dot"></div></a>
    <a href="#" class="nav-tab plus-btn" id="plusBtn"><span>+</span><span>添加</span><div class="nav-dot"></div></a>
    <a href="/growth" class="nav-tab"><span>📊</span><span>数据</span><div class="nav-dot"></div></a>
    <a href="/messages" class="nav-tab"><span>💭</span><span>留言</span><div class="nav-dot"></div></a>
</div>

<script th:inline="javascript">
    /*<![CDATA[*/
    // 年龄、天数、倒计时计算
    const birthday = new Date(2017, 1, 24);
    function updateStats() {
        const now = new Date();
        let years = now.getFullYear() - birthday.getFullYear();
        let months = now.getMonth() - birthday.getMonth();
        let days = now.getDate() - birthday.getDate();
        if (days < 0) { months--; days += new Date(now.getFullYear(), now.getMonth(), 0).getDate(); }
        if (months < 0) { years--; months += 12; }
        document.getElementById('ageValue').innerText = `${years}岁${months}个月${days}天`;
        const birthdayUTC = Date.UTC(2017, 1, 24);
        const todayUTC = Date.UTC(now.getFullYear(), now.getMonth(), now.getDate());
        const total = Math.floor((todayUTC - birthdayUTC) / (1000*60*60*24));
        document.getElementById('totalDays').innerText = total;
        let nextBday = new Date(now.getFullYear(), 1, 24);
        if (now > nextBday) nextBday.setFullYear(nextBday.getFullYear() + 1);
        const countdown = Math.ceil((nextBday - now) / (1000*60*60*24));
        document.getElementById('countdownDays').innerText = countdown;
    }
    updateStats();

    // 从后端 records 提取最新身高体重
    const rawRecords = /*[[${records}]]*/ [];
    let latestHeight = null, latestWeight = null;
    if (rawRecords && rawRecords.length) {
        const growthRecords = rawRecords.filter(r => r.category === 'growth' && (r.heightCm !== null || r.weightKg !== null));
        if (growthRecords.length) {
            growthRecords.sort((a, b) => (b.recordDate || '').localeCompare(a.recordDate || ''));
            const latest = growthRecords[0];
            if (latest.heightCm) latestHeight = latest.heightCm;
            if (latest.weightKg) latestWeight = latest.weightKg;
        }
    }
    const heightSpan = document.getElementById('heightDisplay');
    const weightSpan = document.getElementById('weightDisplay');
    if (latestHeight) heightSpan.innerText = latestHeight;
    if (latestWeight) weightSpan.innerText = latestWeight;

    window.editMetric = function(type) {
        let currentVal = type === 'height' ? heightSpan.innerText : weightSpan.innerText;
        let newVal = prompt(`请输入新的${type === 'height' ? '身高(cm)' : '体重(kg)'}`, currentVal);
        if (newVal && !isNaN(parseFloat(newVal))) {
            const num = parseFloat(newVal).toFixed(1);
            if (type === 'height') {
                heightSpan.innerText = num;
                heightSpan.classList.add('number-jump');
                setTimeout(() => heightSpan.classList.remove('number-jump'), 300);
            } else {
                weightSpan.innerText = num;
                weightSpan.classList.add('number-jump');
                setTimeout(() => weightSpan.classList.remove('number-jump'), 300);
            }
        }
    };

    // 侧边栏
    const sidebar = document.getElementById('sidebar');
    const myBtn = document.getElementById('myBtn');
    const closeSidebar = document.getElementById('closeSidebar');
    myBtn.addEventListener('click', () => sidebar.classList.add('open'));
    closeSidebar.addEventListener('click', () => sidebar.classList.remove('open'));
    document.body.addEventListener('click', (e) => {
        if (!sidebar.contains(e.target) && e.target !== myBtn && !myBtn.contains(e.target)) {
            sidebar.classList.remove('open');
        }
    });

    // 底部导航高亮
    const currentPath = window.location.pathname;
    document.querySelectorAll('.nav-tab').forEach(tab => {
        const href = tab.getAttribute('href');
        if (href === currentPath || (currentPath === '/' && href === '/')) {
            tab.classList.add('active');
        } else {
            tab.classList.remove('active');
        }
    });
    // plus 按钮点击添加
    const plusBtn = document.getElementById('plusBtn');
    plusBtn.addEventListener('click', (e) => {
        e.preventDefault();
        alert('添加新内容：照片、日记、数据等（功能开发中）');
    });

    // 按压反馈
    const clickables = document.querySelectorAll('.quick-icon, .avatar-img, .edit-icon, .my-btn, .nav-tab');
    clickables.forEach(el => {
        el.addEventListener('touchstart', function() { this.style.transform = 'scale(0.96)'; }, {passive: true});
        el.addEventListener('touchend', function() { this.style.transform = ''; });
        el.addEventListener('mousedown', function() { this.style.transform = 'scale(0.96)'; });
        el.addEventListener('mouseup', function() { this.style.transform = ''; });
        el.addEventListener('mouseleave', function() { this.style.transform = ''; });
    });

    // 二次确认退出
    const toastMsg = document.createElement('div');
    toastMsg.className = 'toast-message';
    toastMsg.id = 'toastMsg';
    document.body.appendChild(toastMsg);
    let exitTimer = null;
    let isFirstBack = true;
    function showToast(text) {
        toastMsg.textContent = text;
        toastMsg.classList.add('show');
        if (exitTimer) clearTimeout(exitTimer);
        exitTimer = setTimeout(() => toastMsg.classList.remove('show'), 1500);
    }
    window.history.pushState({ page: "home" }, "", window.location.href);
    window.addEventListener('popstate', function() {
        if (isFirstBack) {
            showToast('再按一次返回退出');
            isFirstBack = false;
            window.history.pushState({ page: "home" }, "", window.location.href);
        } else {
            window.history.back();
        }
        setTimeout(() => { isFirstBack = true; }, 3000);
    });
    /*]]>*/
</script>
</body>
</html>
