<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  <title>时光留言 - 赵高钏的成长手册</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='80' font-size='80'>🌱</text></svg>">
  <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --pink: #FFB5C2;
      --pink-deep: #FF9AB2;
      --pink-light: #FFE0E8;
      --purple: #C8B8E8;
      --purple-deep: #B8A9D4;
      --purple-light: #E8E0F5;
      --blue: #B5D8F7;
      --blue-light: #E0F0F8;
      --green: #B5E8D5;
      --green-light: #E0F5EB;
      --yellow: #FFE8C0;
      --yellow-light: #FFF8E8;
      --text-primary: #5D4E6D;
      --text-secondary: #8B7D9B;
      --text-light: #9B8DAB;
      --card-bg: rgba(255, 255, 255, 0.78);
      --nav-bg: rgba(255, 252, 248, 0.94);
      --shadow-sm: 0 4px 16px rgba(180, 160, 200, 0.08);
      --shadow-md: 0 8px 28px rgba(180, 160, 200, 0.13);
      --shadow-lg: 0 16px 44px rgba(180, 160, 200, 0.18);
      --radius-xl: 28px;
      --radius-lg: 22px;
      --radius-md: 16px;
      --radius-sm: 12px;
      --transition-bounce: cubic-bezier(0.34, 1.56, 0.64, 1);
      --transition-smooth: cubic-bezier(0.4, 0, 0.2, 1);
    }

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: "Noto Sans SC", sans-serif;
      background: linear-gradient(175deg, #FFF8F5 0%, #FEF5F8 8%, #F8F0FF 22%, #F5F0FA 35%, #F0F5FB 50%, #F5F8F5 65%, #FFFBF0 78%, #FFF8F5 100%);
      background-attachment: fixed;
      color: var(--text-primary);
      min-height: 100vh;
      overflow-x: hidden;
      -webkit-tap-highlight-color: transparent;
      -webkit-font-smoothing: antialiased;
      padding-bottom: 100px;
      position: relative;
    }

    /* 顶部导航栏（相册样式） */
    .top-bar {
      position: sticky;
      top: 0;
      z-index: 1000;
      background: rgba(255, 255, 255, 0.7);
      backdrop-filter: blur(22px);
      -webkit-backdrop-filter: blur(22px);
      border-bottom: 1px solid rgba(200, 180, 220, 0.1);
      padding: 0 16px;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .top-bar-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .top-bar-back {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: rgba(200, 180, 220, 0.15);
      border: none;
      cursor: pointer;
      font-size: 1.2em;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-primary);
      transition: all 0.3s var(--transition-bounce);
      text-decoration: none;
    }
    .top-bar-back:active {
      transform: scale(0.85);
      background: rgba(200, 180, 220, 0.3);
    }
    .top-bar-title {
      font-family: "ZCOOL KuaiLe", sans-serif;
      font-size: 1.15em;
      font-weight: 700;
      background: linear-gradient(135deg, #E8788A, #B8A9D4);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.04em;
    }
    .top-bar-mine {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: none;
      background: rgba(200, 180, 220, 0.12);
      cursor: pointer;
      font-size: 1.3em;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.3s var(--transition-bounce);
      color: var(--text-primary);
    }
    .top-bar-mine:active {
      transform: scale(0.88);
      background: rgba(200, 180, 220, 0.25);
    }

    .sidebar-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.35);
      z-index: 2000;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    .sidebar-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .sidebar-panel {
      position: fixed;
      top: 0;
      right: -320px;
      width: 300px;
      max-width: 82vw;
      height: 100%;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(20px);
      z-index: 2001;
      transition: right 0.4s;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      border-radius: var(--radius-xl) 0 0 var(--radius-xl);
      box-shadow: -8px 0 36px rgba(0, 0, 0, 0.1);
    }
    .sidebar-panel.active {
      right: 0;
    }
    .sidebar-close {
      align-self: flex-end;
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: none;
      background: rgba(200, 180, 220, 0.15);
      cursor: pointer;
      font-size: 1.2em;
    }
    .sidebar-user-info {
      text-align: center;
      padding: 16px 0 24px;
    }
    .sidebar-avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFE0E8, #FFB5C2, #E8E0F5);
      margin: 0 auto 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 2.2em;
    }
    .sidebar-username {
      font-family: "ZCOOL KuaiLe", sans-serif;
      font-size: 1.2em;
    }
    .sidebar-links {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .sidebar-link {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 13px 16px;
      border-radius: var(--radius-md);
      text-decoration: none;
      color: var(--text-primary);
      font-weight: 500;
      transition: all 0.3s;
    }
    .sidebar-link:active {
      background: rgba(200, 180, 220, 0.18);
    }

    .bottom-nav {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      z-index: 1000;
      background: var(--nav-bg);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      border-top: 1px solid rgba(200, 180, 220, 0.1);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      display: flex;
      align-items: center;
      justify-content: space-around;
      padding: 6px 8px 12px;
      padding-bottom: max(12px, env(safe-area-inset-bottom));
    }
    .bottom-nav-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      text-decoration: none;
      color: var(--text-light);
      font-size: 0.68em;
      gap: 3px;
      transition: color 0.25s;
    }
    .bottom-nav-item span {
      font-size: 1.5em;
    }
    .bottom-nav-item.active {
      color: #E8788A;
    }
    .bottom-nav-add {
      position: relative;
      top: -22px;
      width: 52px;
      height: 52px;
      border-radius: 50%;
      background: linear-gradient(135deg, #FFB5C2, #FF9AB2);
      border: 4px solid rgba(255, 255, 255, 0.85);
      box-shadow: 0 6px 22px rgba(255, 154, 178, 0.35);
      font-size: 1.6em;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.3s var(--transition-bounce), box-shadow 0.3s;
    }
    .bottom-nav-add:active {
      transform: scale(1.08);
      box-shadow: 0 8px 26px rgba(255, 154, 178, 0.45);
    }

    .add-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.4);
      z-index: 3000;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.35s;
    }
    .add-overlay.active {
      opacity: 1;
      pointer-events: auto;
    }
    .add-sheet {
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(20px);
      border-radius: var(--radius-xl) var(--radius-xl) 0 0;
      width: 100%;
      max-width: 500px;
      padding: 28px 20px 40px;
      transform: translateY(100%);
      transition: transform 0.4s;
    }
    .add-overlay.active .add-sheet {
      transform: translateY(0);
    }

    .page-container {
      max-width: 600px;
      margin: 0 auto;
      padding: 12px 18px 20px;
    }
    .page-header {
      text-align: center;
      margin-bottom: 20px;
    }
    .page-header h1 {
      font-family: "ZCOOL KuaiLe", sans-serif;
      font-size: 2em;
    }
    .section-header h2 {
      font-family: "ZCOOL KuaiLe", sans-serif;
      font-size: 1.3em;
      margin: 22px 0 14px;
      color: var(--text-primary);
    }

    .add-section {
      text-align: center;
      margin-bottom: 28px;
    }
    .btn-add {
      display: inline-block;
      padding: 10px 28px;
      border-radius: 25px;
      font-weight: 600;
      font-size: 0.95em;
      text-decoration: none;
      cursor: pointer;
      border: none;
      font-family: inherit;
      transition: all 0.3s;
    }
    .btn-add-login {
      background: linear-gradient(135deg, #FFB5C2, #FFD4B8);
      color: white;
      box-shadow: 0 4px 16px rgba(255, 180, 160, 0.3);
    }
    .btn-add-active {
      background: linear-gradient(135deg, #B5E8D5, #B8D8F8);
      color: #5D7E6D;
      box-shadow: 0 4px 16px rgba(180, 220, 200, 0.3);
    }

    .message-card {
      background: var(--card-bg);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-radius: var(--radius-lg);
      padding: 22px;
      box-shadow: var(--shadow-sm);
      margin-bottom: 16px;
      transition: all 0.3s;
      border-left: 4px solid transparent;
      position: relative;
    }
    .message-card:nth-child(odd) {
      border-left-color: #FFB5C2;
    }
    .message-card:nth-child(even) {
      border-left-color: #B5E8D5;
    }
    .msg-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 12px;
    }
    .msg-avatar {
      width: 42px;
      height: 42px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3em;
    }
    .msg-author {
      font-weight: 600;
      color: var(--text-primary);
    }
    .msg-date {
      font-size: 0.78em;
      color: #B8A9D4;
    }
    .msg-content {
      color: #6D5E7D;
      line-height: 1.7;
    }
    .msg-delete-form {
      position: absolute;
      top: 16px;
      right: 16px;
    }
    .msg-delete {
      background: rgba(255, 180, 180, 0.25);
      color: #D48888;
      border: none;
      padding: 5px 14px;
      border-radius: 20px;
      font-size: 0.85em;
      cursor: pointer;
      font-weight: 600;
      font-family: inherit;
      transition: all 0.3s;
    }
    .msg-delete:hover {
      background: #FF6B6B;
      color: white;
    }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #B8A9D4;
      font-family: "ZCOOL KuaiLe", sans-serif;
    }

    .add-sheet-title {
      text-align: center;
      font-family: 'ZCOOL KuaiLe', sans-serif;
      font-size: 1.2em;
      color: #5D4E6D;
      margin-bottom: 6px;
    }
    .form-subtitle {
      text-align: center;
      color: #B8A9D4;
      font-size: 0.8em;
      margin-bottom: 24px;
    }
    .field-group {
      margin-bottom: 18px;
    }
    .field-label {
      font-size: 0.85em;
      font-weight: 600;
      color: #8B7D9B;
      margin-bottom: 6px;
    }
    .add-sheet input,
    .add-sheet textarea {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #f0e6f6;
      border-radius: 20px;
      font-family: inherit;
      font-size: 0.95em;
      outline: none;
      background: #FFFAFD;
    }
    .custom-date-wrap {
      position: relative;
    }
    .custom-date-wrap input[type="date"] {
      width: 100%;
      padding: 12px 14px;
      border: 1.5px solid #f0e6f6;
      border-radius: 20px;
      background: #FFFAFD;
      cursor: pointer;
    }
    .custom-date-wrap .date-icon {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      pointer-events: none;
      font-size: 1.2em;
      color: #FF9AB2;
    }
    .btn-submit {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #FFB5C2, #FF9AB2);
      border: none;
      border-radius: 40px;
      color: white;
      font-weight: 700;
      font-size: 1em;
      cursor: pointer;
      transition: all 0.3s;
      margin-top: 8px;
    }
    .btn-submit:active {
      transform: translateY(-2px);
      box-shadow: 0 6px 20px rgba(255, 154, 178, 0.4);
    }
    .add-sheet-cancel {
      display: block;
      margin: 16px auto 0;
      padding: 10px 30px;
      border-radius: 30px;
      border: none;
      background: rgba(200, 180, 220, 0.2);
      color: #8B7D9B;
      cursor: pointer;
      font-size: 0.9em;
      font-family: inherit;
    }

    #backToTop {
      position: fixed;
      bottom: 100px;
      right: 20px;
      z-index: 999;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      border: none;
      background: rgba(255, 255, 255, 0.9);
      box-shadow: 0 4px 16px rgba(0, 0, 0, 0.1);
      font-size: 1.2em;
      cursor: pointer;
      display: none;
      transition: all 0.3s;
    }
  </style>
</head>
<body>

<!-- 顶部导航栏：已改为与相册页相同的样式 -->
<header class="top-bar">
  <div class="top-bar-left">
    <a href="/" class="top-bar-back" aria-label="返回首页">←</a>
    <span class="top-bar-title">💌 时光留言</span>
  </div>
  <button class="top-bar-mine" onclick="toggleSidebar()" aria-label="个人中心">👤</button>
</header>

<div class="sidebar-overlay" id="sidebarOverlay" onclick="toggleSidebar()"></div>
<aside class="sidebar-panel" id="sidebarPanel">
  <button class="sidebar-close" onclick="toggleSidebar()" aria-label="关闭">✕</button>
  <div class="sidebar-user-info">
    <div class="sidebar-avatar">🧸</div>
    <div class="sidebar-username" sec:authorize="isAuthenticated()"><span sec:authentication="name">用户</span></div>
    <div class="sidebar-username" sec:authorize="!isAuthenticated()">访客</div>
  </div>
  <div class="sidebar-links">
    <a sec:authorize="!isAuthenticated()" href="/login" class="sidebar-link">🔐 登录账号</a>
    <a sec:authorize="isAuthenticated()" href="/logout" class="sidebar-link">🚪 退出登录</a>
    <a href="/gallery" class="sidebar-link">📷 相册图集</a>
    <a href="/growth" class="sidebar-link">📊 成长数据</a>
    <a href="/messages" class="sidebar-link">💌 家人留言</a>
  </div>
</aside>

<main class="page-container">
  <div class="page-header">
    <h1>💌 时光留言</h1>
    <p style="color:#8B7D9B;">家人温暖的寄语，留给未来的你</p>
  </div>

  <div class="add-section">
    <a sec:authorize="!isAuthenticated()" href="/login" class="btn-add btn-add-login">＋ 写下留言（需登录）</a>
    <button sec:authorize="isAuthenticated()" class="btn-add btn-add-active" onclick="openAddForm()">＋ 写下留言</button>
  </div>

  <div class="section-header"><h2>💬 家人留言</h2></div>

  <div th:if="${#lists.isEmpty(records)}" class="empty-state">
    <div style="font-size:3em;margin-bottom:12px;">💌</div>
    <p>还没有留言，写下第一条吧</p>
  </div>

  <!-- 留言列表（使用表单 POST 删除） -->
  <div class="message-card" th:each="record, iterStat : ${records}">
    <div class="msg-delete-form">
      <form sec:authorize="isAuthenticated()" th:action="@{/delete/{id}(id=${record.id})}" method="post" onsubmit="return confirm('确定删除这条留言吗？')">
        <button type="submit" class="msg-delete">🗑</button>
      </form>
    </div>
    <div class="msg-header">
      <div class="msg-avatar"
           th:style="'background:' + (${#strings.contains(record.title, '爸爸') || #strings.contains(record.title, '爷爷') || #strings.contains(record.title, '外公') || #strings.contains(record.title, '哥哥') || #strings.contains(record.title, '弟弟') || #strings.contains(record.title, '叔叔') || #strings.contains(record.title, '舅舅') || #strings.contains(record.title, '姨父') || #strings.contains(record.title, '姑父')} ? 'linear-gradient(135deg,#B8D8F8,#A8D0EE)' : 'linear-gradient(135deg,#FFB5C2,#FFD4B8)')">
        <span th:text="${#strings.contains(record.title, '爸爸') || #strings.contains(record.title, '爷爷') || #strings.contains(record.title, '外公') || #strings.contains(record.title, '哥哥') || #strings.contains(record.title, '弟弟') || #strings.contains(record.title, '叔叔') || #strings.contains(record.title, '舅舅') || #strings.contains(record.title, '姨父') || #strings.contains(record.title, '姑父')} ? '👨' : '👩'">💝</span>
      </div>
      <div>
        <div class="msg-author" th:text="${record.title}">作者</div>
        <div class="msg-date" th:text="${#temporals.format(record.recordDate, 'yyyy年MM月dd日')}">日期</div>
      </div>
    </div>
    <div class="msg-content" th:text="${record.description}">留言内容</div>
  </div>
</main>

<nav class="bottom-nav">
  <a href="/" class="bottom-nav-item"><span>🏠</span>首页</a>
  <a href="/gallery" class="bottom-nav-item"><span>📷</span>相册</a>
  <button class="bottom-nav-add" onclick="openAddOverlay()" aria-label="添加记录">+</button>
  <a href="/growth" class="bottom-nav-item"><span>📊</span>数据</a>
  <a href="/messages" class="bottom-nav-item active"><span>💌</span>留言</a>
</nav>

<div class="add-overlay" id="addOverlay">
  <div class="add-sheet">
    <div class="add-sheet-title">✨ 添加新记录</div>
    <div style="display:flex; gap:16px; justify-content:center; margin:20px 0;">
      <a href="/gallery?action=add" style="flex:1; display:flex; flex-direction:column; align-items:center; padding:20px 12px; border-radius:22px; background:rgba(255,240,245,0.5); text-decoration:none; color:#5D4E6D;">
        <span style="font-size:2.5em;">📷</span>
        <span style="font-family:'ZCOOL KuaiLe',sans-serif;">上传照片</span>
      </a>
      <a href="/growth?action=add" style="flex:1; display:flex; flex-direction:column; align-items:center; padding:20px 12px; border-radius:22px; background:rgba(255,240,245,0.5); text-decoration:none; color:#5D4E6D;">
        <span style="font-size:2.5em;">📊</span>
        <span style="font-family:'ZCOOL KuaiLe',sans-serif;">记录数据</span>
      </a>
      <a href="/messages?action=add" style="flex:1; display:flex; flex-direction:column; align-items:center; padding:20px 12px; border-radius:22px; background:rgba(255,240,245,0.5); text-decoration:none; color:#5D4E6D;">
        <span style="font-size:2.5em;">💌</span>
        <span style="font-family:'ZCOOL KuaiLe',sans-serif;">写留言</span>
      </a>
    </div>
    <button class="add-sheet-cancel" onclick="closeAddOverlay()">取消</button>
  </div>
</div>

<div class="add-overlay" id="messageAddOverlay" onclick="if(event.target===this)closeMessageForm()">
  <div class="add-sheet">
    <div class="add-sheet-title">💌 写下留言</div>
    <p class="form-subtitle">留下你对宝宝的温暖寄语</p>
    <form action="/messages/add" method="post">
      <div class="field-group">
        <div class="field-label">📝 称呼 <span style="color:#E8788A;">*必填</span></div>
        <input type="text" name="title" placeholder="如：爸爸、妈妈、爷爷..." required>
      </div>
      <div class="field-group">
        <div class="field-label">💬 留言内容 <span style="color:#E8788A;">*必填</span></div>
        <textarea name="description" rows="3" placeholder="写下你想对宝宝说的话..." required></textarea>
      </div>
      <div class="field-group">
        <div class="field-label">📅 日期 <span style="color:#E8788A;">*必填</span></div>
        <div class="custom-date-wrap">
          <input type="date" name="recordDate" required>
          <span class="date-icon">📆</span>
        </div>
      </div>
      <button type="submit" class="btn-submit">✨ 发布留言</button>
    </form>
    <button class="add-sheet-cancel" onclick="closeMessageForm()">取消</button>
  </div>
</div>

<button id="backToTop" onclick="window.scrollTo({top:0,behavior:'smooth'})">⬆</button>

<script th:inline="javascript">
  /*<![CDATA[*/
  function toggleSidebar() {
    var ov = document.getElementById('sidebarOverlay'), pn = document.getElementById('sidebarPanel');
    ov.classList.toggle('active'); pn.classList.toggle('active');
    document.body.style.overflow = ov.classList.contains('active') ? 'hidden' : '';
  }

  function openAddOverlay() {
    document.getElementById('addOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeAddOverlay() {
    document.getElementById('addOverlay').classList.remove('active');
    document.body.style.overflow = '';
  }
  document.getElementById('addOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeAddOverlay();
  });

  function openAddForm() {
    document.getElementById('messageAddOverlay').classList.add('active');
    document.body.style.overflow = 'hidden';
  }
  function closeMessageForm() {
    document.getElementById('messageAddOverlay').classList.remove('active');
    document.body.style.overflow = '';
  }

  window.addEventListener('scroll', function() {
    document.getElementById('backToTop').style.display = window.scrollY > 300 ? 'block' : 'none';
  });

  var path = window.location.pathname;
  document.querySelectorAll('.bottom-nav-item').forEach(function(item) {
    if (item.getAttribute('href') === path) item.classList.add('active');
  });

  // 优化返回逻辑：优先关闭弹窗，否则交给 app.js 接管退出确认
  (function() {
    if (window.location.pathname === '/' || window.location.pathname === '') return;
    history.replaceState({ fromSubPage: true }, '', window.location.href);
    window.addEventListener('popstate', function(event) {
      var overlays = document.querySelectorAll('.add-overlay.active');
      if (overlays.length > 0) {
        overlays.forEach(function(ov) { ov.classList.remove('active'); });
        history.pushState({ fromSubPage: true }, '', window.location.href);
        return;
      }
      // 没有打开的弹窗，由 app.js 处理退出确认，这里什么都不做
    });
  })();

  // 已移除对登录链接的手动拦截，统一交给 app.js
  /*]]>*/
</script>
<!-- 引入公共导航与退出控制脚本 -->
<script src="/app.js"></script>
</body>
</html>
