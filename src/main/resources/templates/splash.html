<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>正在进入成长手册...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
            background: linear-gradient(150deg, #FFF5F7 0%, #FBE8F0 30%, #F2E6FF 70%, #E8F0FF 100%);
            height: 100vh; width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .bg-decor { position: absolute; pointer-events: none; }
        .cloud {
            width: 120px; height: 50px;
            background: rgba(255,255,255,0.6);
            border-radius: 50%; filter: blur(8px);
            animation: cloudDrift 10s ease-in-out infinite;
        }
        .cloud:nth-child(1) { top: 8%; left: -10%; }
        .cloud:nth-child(2) { top: 25%; right: -15%; animation-delay: -3.5s; width:150px; height:60px; }
        .cloud:nth-child(3) { bottom: 20%; left: -20%; animation-delay: -6s; width:100px; height:45px; }
        .cloud:nth-child(4) { bottom: 10%; right: -5%; animation-delay: -8s; width:180px; height:70px; }
        @keyframes cloudDrift {
            0% { transform: translateX(0); }
            50% { transform: translateX(40px); }
            100% { transform: translateX(0); }
        }
        .star {
            width: 24px; height: 24px; background: #FFE8C0;
            clip-path: polygon(50% 0%, 61% 35%, 98% 35%, 68% 57%, 79% 91%, 50% 70%, 21% 91%, 32% 57%, 2% 35%, 39% 35%);
            animation: twinkle 2.8s ease-in-out infinite;
        }
        .star:nth-child(5) { top: 12%; left: 18%; }
        .star:nth-child(6) { top: 25%; right: 15%; animation-delay: -1s; }
        .star:nth-child(7) { bottom: 30%; left: 10%; animation-delay: -2s; width:18px; height:18px; }
        .star:nth-child(8) { bottom: 18%; right: 20%; animation-delay: -0.5s; width:22px; height:22px; }
        .star:nth-child(9) { top: 55%; left: 75%; animation-delay: -2.8s; }
        @keyframes twinkle {
            0%, 100% { opacity: 0.4; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.3); }
        }
        .center-content {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 15px;
        }
        .tree-icon {
            font-size: 100px;
            animation: treeGrow 1.8s ease-out forwards, treeBounce 2.2s 1.8s ease-in-out infinite;
            transform-origin: bottom center;
            filter: drop-shadow(0 8px 16px rgba(180,160,200,0.3));
        }
        @keyframes treeGrow {
            0% { transform: scale(0) rotate(-15deg); opacity: 0; }
            60% { transform: scale(1.25) rotate(5deg); opacity: 1; }
            100% { transform: scale(1) rotate(0deg); opacity: 1; }
        }
        @keyframes treeBounce {
            0%,100% { transform: translateY(0); }
            50% { transform: translateY(-14px); }
        }
        .title {
            font-size: 2.4em;
            color: #5D4E6D;
            letter-spacing: 0.08em;
            text-shadow: 0 4px 12px rgba(180,140,160,0.2);
        }
        .subtitle {
            font-size: 1em;
            color: #B8A9D4;
        }
        .wave-loader {
            display: flex;
            gap: 14px;
            margin-top: 20px;
        }
        .wave-dot {
            width: 14px; height: 14px; border-radius: 50%;
            animation: waveJump 1.4s ease-in-out infinite both;
        }
        .wave-dot:nth-child(1) { background: #FFB5C2; animation-delay: 0s; }
        .wave-dot:nth-child(2) { background: #C8B8E8; animation-delay: 0.2s; }
        .wave-dot:nth-child(3) { background: #B5E8D5; animation-delay: 0.4s; }
        @keyframes waveJump {
            0%,80%,100% { transform: scale(0.4); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        .hint {
            font-size: 0.9em; color: #9B8DAB;
            opacity: 0.7; animation: fadeHint 2s ease-in-out infinite;
        }
        @keyframes fadeHint {
            0%,100% { opacity: 0.4; }
            50% { opacity: 0.9; }
        }
    </style>
</head>
<body>
    <div class="bg-decor cloud"></div>
    <div class="bg-decor cloud"></div>
    <div class="bg-decor cloud"></div>
    <div class="bg-decor cloud"></div>
    <div class="bg-decor star"></div>
    <div class="bg-decor star"></div>
    <div class="bg-decor star"></div>
    <div class="bg-decor star"></div>
    <div class="bg-decor star"></div>

    <div class="center-content">
        <span class="tree-icon">🌱</span>
        <div class="title">成长手册</div>
        <div class="subtitle">赵高钏的专属时光</div>
        <div class="wave-loader">
            <span class="wave-dot"></span>
            <span class="wave-dot"></span>
            <span class="wave-dot"></span>
        </div>
        <div class="hint">正在进入...</div>
    </div>

    <script>
        (function() {
            // 稳健跳转：使用 DOMContentLoaded + 延迟，不依赖外部资源加载
            function goToHome() {
                window.location.replace('/?loaded=true');
            }

            // 页面结构加载完成后就开始计时，确保一定会跳转
            document.addEventListener('DOMContentLoaded', function() {
                // 动画至少展示 2.5 秒
                setTimeout(goToHome, 2500);
            });

            // 绝对安全：6 秒后强制跳转（即使 DOM 还没 ready）
            setTimeout(goToHome, 6000);
        })();
    </script>
</body>
</html>
