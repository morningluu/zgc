<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>正在进入成长手册...</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="manifest" href="/manifest.json">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
  background: linear-gradient(160deg, #FEF5F9 0%, #FFF0F5 15%, #F5EEFC 35%, #EEF3FB 55%, #F2FAF6 75%, #FFFBF5 100%);
  height: 100vh; width: 100vw;
  overflow: hidden;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
}

/* 浮动粒子 */
.particles { position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 0; }
.particle {
  position: absolute; border-radius: 50%;
  animation: driftUp linear infinite;
  opacity: 0;
}
.particle:nth-child(1)  { width: 6px; height: 6px;  background: #FFB5C2; left: 10%; bottom: -10%; animation-duration: 8s; animation-delay: 0s; }
.particle:nth-child(2)  { width: 4px; height: 4px;  background: #C8B8E8; left: 25%; bottom: -10%; animation-duration: 9s; animation-delay: 0.8s; }
.particle:nth-child(3)  { width: 8px; height: 8px;  background: #B5E8D5; left: 40%; bottom: -10%; animation-duration: 7.5s; animation-delay: 1.6s; }
.particle:nth-child(4)  { width: 5px; height: 5px;  background: #FFDFB8; left: 55%; bottom: -10%; animation-duration: 8.5s; animation-delay: 2.4s; }
.particle:nth-child(5)  { width: 7px; height: 7px;  background: #B8D8FF; left: 70%; bottom: -10%; animation-duration: 7s; animation-delay: 0.4s; }
.particle:nth-child(6)  { width: 3px; height: 3px;  background: #FFB5C2; left: 85%; bottom: -10%; animation-duration: 9.5s; animation-delay: 1.2s; }
.particle:nth-child(7)  { width: 6px; height: 6px;  background: #E8D5F5; left: 15%; bottom: -10%; animation-duration: 8.2s; animation-delay: 3s; }
.particle:nth-child(8)  { width: 4px; height: 4px;  background: #B5E8D5; left: 50%; bottom: -10%; animation-duration: 7.8s; animation-delay: 2s; }
.particle:nth-child(9)  { width: 5px; height: 5px;  background: #FFD4B8; left: 65%; bottom: -10%; animation-duration: 9s; animation-delay: 3.2s; }
.particle:nth-child(10) { width: 6px; height: 6px;  background: #C8B8E8; left: 35%; bottom: -10%; animation-duration: 8s; animation-delay: 1s; }

@keyframes driftUp {
  0%   { transform: translateY(0) scale(0); opacity: 0; }
  10%  { opacity: 0.6; }
  50%  { opacity: 0.4; }
  90%  { opacity: 0.1; }
  100% { transform: translateY(-110vh) scale(1.2); opacity: 0; }
}

/* 中心内容 */
.center {
  z-index: 10; text-align: center;
  display: flex; flex-direction: column; align-items: center; gap: 28px;
}

/* 图标区域：生长的嫩芽 */
.icon-wrap {
  position: relative;
  width: 100px; height: 110px;
  display: flex; align-items: center; justify-content: center;
}

/* 光晕波纹 */
.ripple {
  position: absolute; border-radius: 50%;
  border: 2px solid rgba(200, 180, 220, 0.3);
  animation: rippleOut 2.5s ease-out infinite;
}
.ripple:nth-child(1) { width: 60px; height: 60px;  animation-delay: 0s; }
.ripple:nth-child(2) { width: 60px; height: 60px;  animation-delay: 0.6s; }
.ripple:nth-child(3) { width: 60px; height: 60px;  animation-delay: 1.2s; }

@keyframes rippleOut {
  0%   { transform: scale(0.8); opacity: 0.6; }
  100% { transform: scale(3.5); opacity: 0; }
}

/* 嫩芽图标 */
.sprout-icon {
  font-size: 64px;
  z-index: 2;
  animation: growSprout 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  transform: scale(0);
}
@keyframes growSprout {
  0%   { transform: scale(0) rotate(-10deg); }
  100% { transform: scale(1) rotate(0deg); }
}

/* 标题 */
.title {
  font-size: 2.2em;
  color: #5D4E6D;
  letter-spacing: 0.08em;
  animation: fadeUp 0.8s ease-out 0.3s forwards;
  opacity: 0; transform: translateY(20px);
}
.title span {
  background: linear-gradient(135deg, #E8879B, #9B8DC4);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}

/* 副标题 */
.subtitle {
  font-size: 0.95em;
  color: #B8A9D4;
  margin-top: -16px;
  animation: fadeUp 0.8s ease-out 0.6s forwards;
  opacity: 0; transform: translateY(16px);
}

@keyframes fadeUp {
  0%   { opacity: 0; transform: translateY(20px); }
  100% { opacity: 1; transform: translateY(0); }
}

/* 进度条 */
.progress-wrap {
  width: 180px; height: 3px;
  background: rgba(200, 180, 220, 0.2);
  border-radius: 2px; overflow: hidden;
  animation: fadeUp 0.6s ease-out 1s forwards;
  opacity: 0;
}
.progress-bar {
  width: 0%; height: 100%;
  background: linear-gradient(90deg, #FFB5C2, #C8B8E8, #B5E8D5);
  border-radius: 2px;
  animation: fillBar 3s ease-in-out forwards;
}
@keyframes fillBar {
  0%   { width: 0%; }
  30%  { width: 25%; }
  60%  { width: 55%; }
  85%  { width: 80%; }
  100% { width: 100%; }
}

/* 底部文字 */
.hint {
  font-size: 0.8em;
  color: #C8B8D8;
  animation: hintPulse 2s ease-in-out 1.4s infinite;
  opacity: 0;
}
@keyframes hintPulse {
  0%, 100% { opacity: 0.3; }
  50%      { opacity: 0.8; }
}
</style>
</head>
<body>

<div class="particles">
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div><div class="particle"></div><div class="particle"></div>
  <div class="particle"></div>
</div>

<div class="center">
  <div class="icon-wrap">
    <div class="ripple"></div>
    <div class="ripple"></div>
    <div class="ripple"></div>
    <span class="sprout-icon">🌱</span>
  </div>
  <div class="title"><span>成长手册</span></div>
  <div class="subtitle">赵高钏的专属时光</div>
  <div class="progress-wrap">
    <div class="progress-bar"></div>
  </div>
  <div class="hint">正在进入...</div>
</div>

<script>
(function() {
  var redirected = false;

  function goToTarget() {
    if (redirected) return;
    redirected = true;
    var targetPath = sessionStorage.getItem('splashTarget') || '/?loaded=true';
    sessionStorage.removeItem('splashTarget');
    window.location.replace(targetPath);
  }

  document.addEventListener('DOMContentLoaded', function() {
    setTimeout(goToTarget, 3500);
  });
  setTimeout(goToTarget, 8000);
})();
</script>
</body>
</html>
