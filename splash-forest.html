<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>成长森林 - 开启探索之旅</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+KuaiLe&family=Noto+Sans+SC:wght@300;400;500&display=swap" rel="stylesheet">
    <style>
        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
        }
        
        :root {
            --forest-dark: #2D5A27;
            --forest-mid: #4A7C43;
            --forest-light: #7CB342;
            --leaf-green: #8BC34A;
            --moss-green: #607D3B;
            --sky-green: #C5E1A5;
            --earth-brown: #8D6E63;
            --wood-brown: #A1887F;
            --text-dark: #33691E;
            --text-light: #7CB342;
        }
        
        body {
            font-family: "ZCOOL KuaiLe", "Noto Sans SC", sans-serif;
            background: linear-gradient(180deg, #E8F5E9 0%, #C8E6C9 50%, #A5D6A7 100%);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        
        .forest-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            overflow: hidden;
        }
        
        .leaf {
            position: absolute;
            font-size: 40px;
            animation: leafFall 10s ease-in-out infinite;
            opacity: 0.6;
        }
        
        .leaf:nth-child(1) { top: -10%; left: 15%; animation-delay: 0s; }
        .leaf:nth-child(2) { top: -5%; left: 45%; animation-delay: -2s; font-size: 35px; }
        .leaf:nth-child(3) { top: -8%; right: 20%; animation-delay: -4s; }
        .leaf:nth-child(4) { top: -12%; left: 70%; animation-delay: -6s; font-size: 45px; }
        .leaf:nth-child(5) { top: -7%; right: 8%; animation-delay: -8s; }
        .leaf:nth-child(6) { top: -15%; left: 35%; animation-delay: -1s; font-size: 30px; }
        
        @keyframes leafFall {
            0% {
                transform: translateY(-20px) rotate(0deg);
                opacity: 0;
            }
            10% {
                opacity: 0.7;
            }
            90% {
                opacity: 0.7;
            }
            100% {
                transform: translateY(120vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        .mushroom {
            position: absolute;
            font-size: 50px;
            animation: mushroomBounce 3s ease-in-out infinite;
        }
        
        .mushroom:nth-child(7) { bottom: 15%; left: 10%; animation-delay: 0s; }
        .mushroom:nth-child(8) { bottom: 20%; right: 15%; animation-delay: -1.5s; font-size: 40px; }
        
        @keyframes mushroomBounce {
            0%, 100% {
                transform: translateY(0) scale(1);
            }
            50% {
                transform: translateY(-10px) scale(1.05);
            }
        }
        
        .main-content {
            z-index: 10;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 28px;
        }
        
        .tree-container {
            position: relative;
            width: 180px;
            height: 180px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .ground {
            position: absolute;
            bottom: 10px;
            width: 200px;
            height: 20px;
            background: var(--earth-brown);
            border-radius: 50%;
            opacity: 0.4;
            animation: groundPulse 2s ease-in-out infinite;
        }
        
        @keyframes groundPulse {
            0%, 100% {
                transform: scaleX(1);
            }
            50% {
                transform: scaleX(1.1);
            }
        }
        
        .tree {
            font-size: 140px;
            animation: treeGrow 2.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards, treeSway 4s 2.5s ease-in-out infinite;
            transform-origin: bottom center;
            filter: drop-shadow(0 15px 35px rgba(45, 90, 39, 0.35));
        }
        
        @keyframes treeGrow {
            0% {
                transform: scale(0) translateY(80px) rotate(-20deg);
                opacity: 0;
            }
            40% {
                transform: scale(0.7) translateY(30px) rotate(-10deg);
                opacity: 0.8;
            }
            80% {
                transform: scale(1.2) translateY(-10px) rotate(8deg);
                opacity: 1;
            }
            100% {
                transform: scale(1) translateY(0) rotate(0deg);
                opacity: 1;
            }
        }
        
        @keyframes treeSway {
            0%, 100% {
                transform: rotate(-3deg);
            }
            25% {
                transform: rotate(2deg);
            }
            50% {
                transform: rotate(-2deg);
            }
            75% {
                transform: rotate(3deg);
            }
        }
        
        .bird {
            position: absolute;
            font-size: 35px;
            animation: birdFly 6s ease-in-out infinite;
        }
        
        .bird:nth-child(2) { top: 20%; left: -5%; animation-delay: 0s; }
        .bird:nth-child(3) { top: 25%; right: -5%; animation-delay: -3s; font-size: 30px; }
        
        @keyframes birdFly {
            0% {
                transform: translateX(0) translateY(0);
            }
            25% {
                transform: translateX(20vw) translateY(-15px);
            }
            50% {
                transform: translateX(40vw) translateY(5px);
            }
            75% {
                transform: translateX(60vw) translateY(-10px);
            }
            100% {
                transform: translateX(100vw) translateY(0);
            }
        }
        
        .title-section {
            animation: titleSlide 1.5s ease-out 1.2s forwards;
            opacity: 0;
            transform: translateY(40px);
        }
        
        @keyframes titleSlide {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .main-title {
            font-size: 3.2em;
            color: var(--text-dark);
            letter-spacing: 0.18em;
            text-shadow: 0 7px 22px rgba(45, 90, 39, 0.25);
            margin-bottom: 10px;
        }
        
        .subtitle {
            font-size: 1.2em;
            color: var(--text-light);
        }
        
        .acorn-loader {
            display: flex;
            gap: 20px;
            margin-top: 35px;
            animation: loaderFade 1s ease-out 1.8s forwards;
            opacity: 0;
        }
        
        @keyframes loaderFade {
            to {
                opacity: 1;
            }
        }
        
        .acorn {
            font-size: 32px;
            animation: acornBounce 2s ease-in-out infinite;
        }
        
        .acorn:nth-child(1) { animation-delay: 0s; }
        .acorn:nth-child(2) { animation-delay: 0.25s; }
        .acorn:nth-child(3) { animation-delay: 0.5s; }
        .acorn:nth-child(4) { animation-delay: 0.75s; }
        
        @keyframes acornBounce {
            0%, 80%, 100% {
                transform: translateY(0) scale(0.8) rotate(0deg);
                opacity: 0.5;
            }
            40% {
                transform: translateY(-35px) scale(1.15) rotate(15deg);
                opacity: 1;
            }
        }
        
        .hint {
            font-size: 1em;
            color: #607D3B;
            opacity: 0;
            animation: hintPulse 2s ease-in-out infinite 2.5s;
            margin-top: 20px;
        }
        
        @keyframes hintPulse {
            0%, 100% {
                opacity: 0.3;
            }
            50% {
                opacity: 0.85;
            }
        }
    </style>
</head>
<body>
    <div class="forest-bg">
        <span class="leaf">🍃</span>
        <span class="leaf">🌿</span>
        <span class="leaf">🍂</span>
        <span class="leaf">🌱</span>
        <span class="leaf">🍃</span>
        <span class="leaf">🌿</span>
        <span class="mushroom">🍄</span>
        <span class="mushroom">🍄</span>
        <span class="bird">🐦</span>
        <span class="bird">🐦</span>
    </div>
    
    <div class="main-content">
        <div class="tree-container">
            <div class="ground"></div>
            <span class="tree">🌳</span>
        </div>
        
        <div class="title-section">
            <h1 class="main-title">成长森林</h1>
            <p class="subtitle">探索每一个成长的足迹</p>
        </div>
        
        <div class="acorn-loader">
            <span class="acorn">🌰</span>
            <span class="acorn">🌰</span>
            <span class="acorn">🌰</span>
            <span class="acorn">🌰</span>
        </div>
        
        <p class="hint">正在探索...</p>
    </div>
    
    <script>
        setTimeout(() => {
            window.location.href = '/home';
        }, 4500);
    </script>
</body>
</html>
