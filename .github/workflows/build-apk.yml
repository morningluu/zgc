name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Install deps & setup Android
        working-directory: zgc-mobile
        run: |
          npm install
          npm install @capacitor/assets --save-dev
          npx cap add android
          chmod +x android/gradlew

      - name: Generate app icons
        working-directory: zgc-mobile
        run: |
          cp ../src/main/resources/static/xtb.png icon-source.png
          npx capacitor-assets generate --iconBackgroundColor '#fdadb7' --iconBackgroundColorDark '#fdadb7'

      - name: Build APK
        working-directory: zgc-mobile/android
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 成长手册-APK
          path: zgc-mobile/android/app/build/outputs/apk/debug/app-debug.apk
