name: Build APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 platform-tools'

      - name: Install deps & sync
        working-directory: zgc-mobile
        run: |
          npm install
          npx cap sync android

      - name: Replace app icon
        working-directory: zgc-mobile/android/app/src/main/res
        run: |
          for dir in mipmap-hdpi mipmap-mdpi mipmap-xhdpi mipmap-xxhdpi mipmap-xxxhdpi; do
            cp ../../../../../../src/main/resources/static/xtb.png $dir/ic_launcher.png
            cp ../../../../../../src/main/resources/static/xtb.png $dir/ic_launcher_round.png
          done

      - name: Build APK
        working-directory: zgc-mobile/android
        run: |
          echo "sdk.dir=$ANDROID_SDK_ROOT" > local.properties
          ./gradlew assembleDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: 成长手册-APK
          path: zgc-mobile/android/app/build/outputs/apk/debug/app-debug.apk
